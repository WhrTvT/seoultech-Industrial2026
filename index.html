·우버의 O2O 서비스가 부상한다.", "카카오톡 같은 모바일 메신저는 게임·광고·커머스를 아우르는 거대 복합 플랫폼으로 성장한다.", "개방 플랫폼으로 변환: OS·네트워크 중심 생태계에서 서비스가 주축이 되는 개방 플랫폼으로 바뀌며, 메신저에 락인된 고객 위에 서비스를 추가하는 형태로 계층과 지배력 구조가 변화한다."]}, {"heading": "모바일 서비스 플랫폼의 미래", "points": ["플랫폼은 모든 정보·콘텐츠·네트워크·단말 장치에 공통으로 연결되어 정보 시대의 길목을 지키는 컨테이너 역할을 한다.", "VR/AR/MR 영역: HMD(Head Mounted Display) 및 콘텐츠 중심으로 발전한다.", "핀테크 영역: 전통적 금융권과 신규 시장을 넘나드는 IT 기업 간 연합이 이루어진다.", "헬스케어/메디컬케어: 웨어러블(wearable) 제품·서비스와 접목된다.", "자동차: 전기차, 자율 주행차(self-driving car), 커넥티드 카(connected car)로 진화하며 미래의 움직이는 플랫폼이 된다.", "미래 플랫폼 기술은 크라우드소싱·크라우드펀딩, O2O 커머스, 핀테크, 스마트홈·드론·로봇 분야에서 새로운 가치를 창출한다."]}], "keywords": [{"term": "소셜 플랫폼(Social Platform)", "explanation": "일상생활부터 조직 운영·비즈니스까지 인간 행위의 모든 분야에 소셜화를 가능하게 하는 기반으로, 사람 중심의 관계 형성을 통해 사회적 자본을 만든다."}, {"term": "사회적 자본(social capital)", "explanation": "'사람'을 중심으로 한 사회적 관계 형성을 통해 축적되는 자본으로, 소셜 플랫폼이 이를 형성하는 기반으로 작용한다."}, {"term": "락인(Lock-In)", "explanation": "고객을 특정 플랫폼·서비스에 묶어두는 전략으로, 아마존 프라임 멤버십이나 모바일 메신저에 락인된 고객 위에 서비스를 추가하는 형태가 대표적이다."}, {"term": "O2O(Online to Offline) 커머스", "explanation": "온라인과 오프라인을 연결하는 서비스로, 아마존 프레시·아마존 로컬, 에어비앤비, 우버 등이 대표적인 사례이다."}, {"term": "MIUI(미유아이)", "explanation": "샤오미가 오픈 소스 기반 안드로이드를 수정해 만든 운영 체제로, iOS와 안드로이드의 장점을 섞은 사용자 인터페이스(UI)를 제공한다."}, {"term": "AWS(Amazon Web Services)", "explanation": "아마존의 클라우드 컴퓨팅 서비스로, 전 세계 190여 개 국가에 서비스를 제공하며 세계 클라우드 시장에서 독보적 점유율을 차지한다."}, {"term": "대시 버튼(Dash Button)", "explanation": "버튼을 누르기만 하면 연계된 생필품이 주문되는 아마존의 서비스로, 주문형 경제(On-demand Economy)의 한 사례이다."}, {"term": "카피캣(Copycat)", "explanation": "기존 성공 기업의 모델을 모방해 출발하는 전략으로, 알리바바는 이베이·페이팔을, 샤오미는 애플을 모방한 카피캣으로 시작했다."}, {"term": "HMD(Head Mounted Display)", "explanation": "머리에 착용하는 디스플레이 장치로, 미래 VR/AR/MR 영역이 HMD와 콘텐츠 중심으로 발전한다."}, {"term": "커넥티드 카(connected car)", "explanation": "전기차·자율 주행차와 함께 자동차가 진화하는 형태로, 네트워크에 연결되어 미래의 움직이는 플랫폼이 된다."}], "quiz": [{"question": "소셜 플랫폼의 정의로 가장 적절한 것은?", "options": ["하드웨어 제조와 부품 표준화를 담당하는 기반", "일상생활부터 조직 운영·비즈니스까지 인간 행위 모든 분야에 소셜화를 가능하게 하는 기반", "OS와 네트워크만을 중심으로 단말을 제어하는 폐쇄 시스템", "금융 거래만을 전문적으로 중개하는 결제 전용 기반"], "answer": 1, "explanation": "소셜 플랫폼은 의사소통 등 일상생활부터 조직 운영과 비즈니스까지 인간 행위의 모든 분야에 소셜화를 가능하게 하는 기반으로 정의된다. '사람' 중심 관계 형성으로 사회적 자본을 만드는 것이 핵심이다."}, {"question": "각 기업과 그 특징의 연결이 올바르지 않은 것은?", "options": ["Facebook - 2004년 설립, 뉴스피드·타임라인과 앱센터(App Center) 기반 개발자 생태계 운영", "Amazon - 1994년 제프 베조스 설립, 킨들·AWS 클라우드·대시 버튼 운영", "Alibaba - 커머스와 금융 양쪽 플랫폼 소유, 알리페이·위어바오 운영", "Xiaomi - 세계 1위 스마트폰 제조업체로, 애플 iOS를 수정한 자체 OS인 MIUI를 개발"], "answer": 3, "explanation": "D가 틀린 연결이다. 샤오미는 세계 '1위'가 아니라 세계 '4번째' 규모의 스마트폰 제조업체이며, MIUI는 애플 iOS가 아니라 '오픈 소스 안드로이드'를 수정해 만든 OS이다(애플은 카피캣으로 모방한 대상일 뿐 OS 기반이 아니다). A는 페이스북의 2004년 설립과 뉴스피드·타임라인·앱센터 생태계 설명이 본문과 일치한다. B는 아마존의 1994년 제프 베조스 설립과 킨들·AWS·대시 버튼 운영이 본문과 일치한다. C는 알리바바가 커머스와 금융 양쪽 플랫폼을 소유하고 알리페이·위어바오를 운영한다는 설명이 본문과 일치한다."}, {"question": "모바일 플랫폼 3강의 전략 설명으로 옳은 것은?", "options": ["애플은 하드웨어 없이 서비스만 중심으로 하는 플랫폼을 운영한다.", "구글은 '개방'을 선택해 안드로이드를 누구나 쓸 수 있게 하여 업계의 '절대 선' 역할을 했다.", "삼성전자는 앱스토어로 앱 유통권을 직접 쥐는 전통적 하드웨어+소프트웨어 방식을 취한다.", "구글은 1년에 한 번 스마트폰을 내놓는 하드웨어+소프트웨어 결합 전략을 쓴다."], "answer": 1, "explanation": "구글은 아이폰과 경쟁하기 위해 '개방'을 선택했고 안드로이드는 누구나 원하는 대로 쓸 수 있어 업계의 '절대 선' 역할을 했다. 하드웨어+소프트웨어와 앱스토어 유통권 전략은 애플의 것이며, 삼성전자는 하드웨어 자체가 플랫폼이 되는 전략이다."}, {"question": "모바일 플랫폼 비즈니스 변화에 대한 설명으로 옳은 것은?", "options": ["OS 플랫폼이 강화되면서 서비스 플랫폼은 점차 사라지고 있다.", "애플 앱스토어는 160만 개, 구글 플레이는 150만 개 이상의 앱이 등록되어 있다.", "카카오톡 같은 모바일 메신저는 게임·광고·커머스를 아우르는 거대 복합 플랫폼으로 성장한다.", "앱들 상호 간 차별성과 구속력이 점점 강해지고 있다."], "answer": 2, "explanation": "카카오톡 같은 모바일 메신저는 게임 콘텐츠, 광고 마케팅 플랫폼, 커머스 등을 아우르는 거대 복합 플랫폼으로 성장한다. 변화 방향은 OS에서 서비스 플랫폼으로의 전환이며, 등록 앱은 애플 150만·구글 160만 개, 앱 간 차별성과 구속력은 줄어들고 있다."}, {"question": "모바일 서비스 플랫폼의 미래 비즈니스 영역과 설명의 연결로 옳은 것은?", "options": ["VR/AR/MR - HMD 및 콘텐츠 중심으로 발전", "핀테크 - 웨어러블 제품·서비스와 접목", "헬스케어 - 전통적 금융권과 IT 기업 간 연합", "자동차 - HMD 디스플레이 장치 중심으로 발전"], "answer": 0, "explanation": "VR/AR/MR 영역은 HMD(Head Mounted Display) 및 콘텐츠 중심으로 발전한다. 핀테크는 금융권과 IT 기업 간 연합, 헬스케어는 웨어러블 접목, 자동차는 전기차·자율주행차·커넥티드 카로 진화하므로 나머지는 연결이 뒤바뀌어 있다."}], "fill": [{"question": "샤오미는 오픈 소스 기반 안드로이드를 수정해 ____라는 자체 운영 체제를 만들었으며, 이는 iOS와 안드로이드의 장점을 섞은 사용자 인터페이스를 제공한다.", "answer": "MIUI", "accept": ["미유아이", "미우이"], "explanation": "MIUI는 샤오미가 안드로이드를 수정해 만든 운영 체제로 iOS와 안드로이드의 장점을 결합한 UI를 제공한다."}, {"question": "아마존은 1994년 7월 ____가 온라인 서점으로 설립했으며, 이후 유통업체 시가총액 1위로 월마트를 추월했다.", "answer": "제프 베조스", "accept": ["베조스", "Jeff Bezos", "제프베조스"], "explanation": "원문에서 아마존은 1994년 7월 제프 베조스가 설립했다고 명시되어 있다."}, {"question": "버튼을 누르기만 하면 연계된 생필품이 주문되는 아마존의 서비스인 ____은 주문형 경제(On-demand Economy)의 한 사례이다.", "answer": "대시 버튼", "accept": ["Dash Button", "대시버튼", "Dash"], "explanation": "대시 버튼은 버튼을 누르면 연계 생필품이 주문되는 아마존 서비스로 주문형 경제의 사례로 제시된다."}, {"question": "미래 VR/AR/MR 영역은 머리에 착용하는 디스플레이 장치인 ____ 및 콘텐츠 중심으로 발전한다.", "answer": "HMD", "accept": ["Head Mounted Display", "헤드 마운티드 디스플레이", "에이치엠디"], "explanation": "원문에서 VR/AR/MR 영역은 HMD(Head Mounted Display) 및 콘텐츠 중심으로 발전한다고 설명한다."}]}, {"id": "ch11", "number": 11, "title": "미래 플랫폼 기술: 크라우드소싱·크라우드펀딩·O2O·핀테크·스마트홈·드론·로봇", "summary": [{"heading": "크라우드소싱 (Crowdsourcing)", "points": ["대중(Crowd)과 아웃소싱(Outsourcing)의 합성어로, 대중이 참여하여 아이디어·콘텐츠·제품·서비스 등을 만들어가는 프로세스를 의미한다.", "다양한 분야의 사람들이 전문성과 관심사에 따라 생각을 공유하고 협업하는 매개형 플랫폼이며, 공유와 협업의 플랫폼이다.", "제프 하우(Jeff Howe)가 2006년 IT 전문 잡지 「Wired」지에서 처음 소개했으며, '모든 사람이 문제 해결에 달려든다면 해결하지 못할 문제는 없다'는 철학에서 출발한다.", "대표 사례인 오픈 소스 소프트웨어 운동은 개발자 권리를 보장하면서 소스 코드를 누구나 열람하게 하여, 오류 발견·수정·기능 추가로 이어지는 선순환 구조를 구축한다.", "이노센티브(Innocentive)는 R&D 문제 해결에 크라우드소싱을 도입한 사례로, 200여 개 국가의 과학기술자 약 30만 명이 1,600건이 넘는 문제 중 85%를 해결하고 약 4천만 달러 이상의 상금을 받았다.", "오픈 소스 건축물은 비전문가도 공개된 설계 도면으로 건축할 수 있게 하며, 런던의 건축가 칼 터너(Carl Turner)가 수재에 대비하는 조립식 플로팅 하우스(floating house)를 공개한 사례가 있다."]}, {"heading": "크라우드펀딩 (Crowdfunding)", "points": ["대중(Crowd)과 펀딩(Funding)의 합성어로 대중에 의한 투자 플랫폼이며, 인터넷을 통해 불특정 다수 개인으로부터 자금을 모으는 행위로 소셜 펀딩·하이퍼 펀딩이라고도 한다.", "투자자와 창업자를 연결하는 기능을 하며, 시장에서 검증되지 않은 참신한 아이디어를 제품화하는 데 위력이 커지고 있다.", "유형은 지분 투자(투자 금액에 따른 이익 배분), 공동 구매(완료 후 제품·서비스 제공받음), 대출(이자·원금 회수), 후원(금전 외 보상, 주로 공연·영화·음악), 기부(보상 없는 순수 기부)로 나뉜다.", "대표 사례 킥스타터(Kickstarter)는 자금이 필요한 사람과 투자자를 연결하는 매개형 플랫폼으로 기술·공연예술·영화·음악·만화·게임 등 문화 영역을 지원한다.", "킥스타터는 모금 기간 종료 시 총 모금액이 목표액에 도달해야 자금을 전달하며, 미달 시 투자가 이루어지지 않고, 성공 사례로는 오큘러스 리프트(Oculus Rift), 스마트워치 페블(Pebble)이 있다.", "기타 사례로 아티스트쉐어(ArtistShare, 음악가와 팬 연결), 앱스플릿(Appsplit, 앱 개발 자금·소스 코드 거래·협업), 패트리온(Patreon, 콘텐츠 창작자 후원)이 있다."]}, {"heading": "O2O 커머스 플랫폼 (Online-to-Offline)", "points": ["온라인을 통해 소비자를 모아 오프라인에서 상거래를 유발하는 비즈니스 플랫폼으로, 대표적으로 우버(Uber)와 에어비앤비(Airbnb)가 있다.", "국내 음식 배달 분야에서는 배달의 민족·요기요·배달통 3대 서비스가 모바일 결제의 약 90%를 차지한다.", "부동산 중개 분야는 직방·다방·복방·콜방 등이 경쟁하며 직방이 약 70% 점유율로 업계 1위이다(2015년 기준).", "기존 오프라인 사업자의 시장을 침투하는 성격이 있어 마찰 소지가 있으며, 우버는 약 50조 원의 기업 가치를 가지나 각국 정부·택시 기사와 마찰을 빚는다.", "우버는 2009년 개릭 캠프와 트래비스 캘러닉이 UberCab으로 설립한 스마트폰 기반 교통 서비스로, 2014년 6월 기준 100개 도시 이상에서 서비스했다.", "에어비앤비는 2008년 8월 브라이언 체스키와 조 게비아가 창립한 세계 최대 숙박 공유 서비스로, 200여 개 국가 3만 4천여 개 도시에 약 120만 개 이상 숙소를 중개하며 한 해 이용객이 4천만 명을 넘어 약 2초당 한 건씩 예약된다."]}, {"heading": "핀테크 (Fintech)", "points": ["금융(Financial)과 기술(technique)의 합성어로 금융과 IT의 융합을 통해 만들어진 기술 및 서비스이며, 금융 기관과 소비자를 매개하는 매개형 플랫폼이 본질이나 기반형·복합형도 존재한다.", "선두 주자로는 영국(런던, 2008년 글로벌 금융 위기 이후 다수 스타트업 등장), 미국(월스트리트·실리콘밸리 중심), 중국(방대한 내수 시장과 정부 지원 정책)이 있다.", "유형 중 지급 결제 서비스는 신용카드·은행 계좌와 연동해 송금이나 온·오프라인 결제를 제공하며, 페이팔·알리페이·카카오페이·삼성페이, 스퀘어(오디오 잭에 카드 리더기 연결), 스트라이프(결제 시스템 통합) 등이 있다.", "가상 통화(전자 화폐)는 실물 없이 전자적으로 유통되며, 환전의 용이성에 따라 사이버 머니와 글로벌 가상 통화로 구분된다.", "사이버 머니(OK 캐쉬백·네이버 캐쉬·해피머니 등)는 특정 기관이 발행·관리하고 제휴처에서 제한적으로 사용되며 환전이 자유롭지 않아 완전한 화폐 역할이 부족하다.", "글로벌 가상 통화(비트코인·이더리움·리플 등)는 전 세계 누구와도 거래 가능하고 거래소를 통해 실물 화폐로 환전이 가능한 완전한 화폐 역할을 수행한다."]}, {"heading": "비트코인 (Bitcoin)", "points": ["2009년 처음 등장했으며 사토시 나카모토(Satoshi Nakamoto) 또는 Craig Wright가 만들었다고 알려져 있다.", "중앙 권력이나 중간 상인 없이 사용자에 의해 작동하는 최초의 분권화된 P2P 금융 네트워크로 정의된다.", "특징으로 분산 통화(소지자 모두가 은행의 작은 일부 역할)와 쌍방향성(실물 화폐로의 전환이 자유로움)을 가진다.", "획득 방법은 거래소에서 현금 교환(국내 Bithumb·Coinone 등)과 복잡한 수학 연산을 통한 채굴(Mining)이 있다.", "채굴량은 자동 조정되어 채굴자가 많아지면 연산 난이도가 높아지며, 공급량은 4년에 한 번씩 절반으로 감소하도록 설계되어 채산성을 낮추고 가치를 증가시킨다.", "채굴 장치는 초기 PC의 CPU에서 그래픽 카드 GPU로, 현재는 채굴 특화 칩을 내장한 채굴기(Miner)로 발전했다."]}, {"heading": "스마트홈·드론·로봇 플랫폼", "points": ["스마트홈은 가전·조명·에너지 관리·네트워크·보안·냉난방 및 환기(HVAC)·엔터테인먼트 솔루션과 각종 서비스를 포함한다.", "스마트홈 사례로 뉴브라이트(NuBryte, 터치스크린 콘솔로 50여 종 제어), 벨킨의 위모(WeMo), 윙크(Wink, 윙크 허브로 연동), 스택의 알바(Alba, 진화된 스마트 조명)가 있다.", "드론 플랫폼은 무인 항공기(UAV) 시장 성장이 예상되며 취미·기업·산업·군사용 등으로 활용되고, 소프트웨어·서비스를 통한 가치 창출이 중요해지며 그 역할이 커지고 있다.", "드론 플랫폼 사례 에어웨어(Airware)는 표준화된 민간 드론 운영 체제를 처음 선보였으며 플라이트 코어·앱코어·클라우드·지상 관제 소프트웨어 등으로 구성된다.", "리브레파일럿(LibrePilot)은 오픈 소스 기반 드론 플랫폼이고, DJI는 전 세계 상업용 드론 시장의 약 70%를 점유한 세계 최대 드론 제조업체이다.", "로봇 플랫폼으로는 Willow Garage사와 Stanford AI 연구소가 만든 ROS(대표 사례 Rethink Robotics사의 Baxter 로봇)와 프랑스 Aldebaran Robotics사의 나오치(NAOqi, 대표 사례 로봇 NAO)가 있다."]}], "keywords": [{"term": "크라우드소싱 (Crowdsourcing)", "explanation": "대중(Crowd)과 아웃소싱(Outsourcing)의 합성어로, 대중이 참여하여 아이디어·콘텐츠·제품·서비스를 만들어가는 공유·협업 기반의 매개형 플랫폼이다. 제프 하우가 2006년 「Wired」지에서 처음 소개했다."}, {"term": "이노센티브 (Innocentive)", "explanation": "기업이 올린 R&D 문제를 등록된 과학기술자들이 해결하고 금전적 보상을 받는 크라우드소싱 사례로, 약 30만 명이 문제의 85%를 해결하고 4천만 달러 이상의 상금을 받았다."}, {"term": "크라우드펀딩 (Crowdfunding)", "explanation": "대중(Crowd)과 펀딩(Funding)의 합성어로 인터넷을 통해 불특정 다수에게서 자금을 모아 투자자와 창업자를 연결하는 투자 플랫폼이며, 소셜 펀딩·하이퍼 펀딩이라고도 한다."}, {"term": "킥스타터 (Kickstarter)", "explanation": "자금이 필요한 사람과 투자자를 연결하는 크라우드펀딩 매개형 플랫폼으로, 목표 모금액 도달 시에만 자금을 전달하며 오큘러스 리프트·페블 등의 성공 사례가 있다."}, {"term": "O2O 커머스 (Online-to-Offline Commerce)", "explanation": "온라인을 통해 소비자를 모아 오프라인에서 상거래를 유발하는 비즈니스 플랫폼으로, 우버·에어비앤비가 대표적이며 기존 오프라인 사업자와 마찰이 발생할 수 있다."}, {"term": "핀테크 (Fintech)", "explanation": "금융(Financial)과 기술(technique)의 합성어로 금융과 IT의 융합으로 만들어진 기술·서비스이며, 금융 기관과 소비자를 매개하는 매개형 플랫폼이 본질이다."}, {"term": "비트코인 (Bitcoin)", "explanation": "2009년 등장한 최초의 분권화된 P2P 금융 네트워크로, 중앙 권력 없이 사용자에 의해 작동하며 채굴을 통해 생성되고 공급량이 4년마다 절반으로 감소하도록 설계된 글로벌 가상 통화이다."}, {"term": "사이버 머니 (Cyber Money)", "explanation": "OK 캐쉬백·네이버 캐쉬·해피머니처럼 특정 기관이 발행·관리하고 제휴처에서 제한적으로 사용되며 환전이 자유롭지 않아 완전한 화폐 역할이 부족한 전자 화폐이다."}, {"term": "드론 플랫폼 (Drone Platform)", "explanation": "무인 항공기(UAV) 기반 플랫폼으로 소프트웨어·서비스를 통한 가치 창출이 중요해지며, 에어웨어·리브레파일럿 등이 있고 DJI가 상업용 시장의 약 70%를 점유한다."}, {"term": "ROS (Robot Operating System)", "explanation": "Willow Garage사와 Stanford AI 연구소가 만든 로봇 운영 체제 플랫폼으로, 대표 사례로 Rethink Robotics사의 Baxter 로봇이 있다."}], "quiz": [{"question": "크라우드소싱(Crowdsourcing)에 대한 설명으로 옳은 것은?", "options": ["금융과 기술의 합성어로 송금·결제 서비스를 제공한다.", "대중(Crowd)과 아웃소싱(Outsourcing)의 합성어로, 제프 하우가 2006년 「Wired」지에서 처음 소개했다.", "온라인으로 소비자를 모아 오프라인 상거래를 유발하는 플랫폼이다.", "불특정 다수로부터 자금을 모으는 투자 플랫폼이다."], "answer": 1, "explanation": "크라우드소싱은 대중(Crowd)과 아웃소싱(Outsourcing)의 합성어로 제프 하우(Jeff Howe)가 2006년 「Wired」지에서 처음 소개했다. A는 핀테크, C는 O2O 커머스, D는 크라우드펀딩에 대한 설명이다."}, {"question": "크라우드펀딩의 유형 중, 지원한 자금에 대해 금전적 보상 이외의 형태로 보상을 받으며 주로 공연 예술·영화·음악 분야에서 이용되는 것은?", "options": ["지분 투자", "대출", "후원", "기부"], "answer": 2, "explanation": "후원은 금전적 보상 이외의 형태로 보상을 받으며 주로 공연 예술·영화·음악 분야에서 이용된다. 지분 투자는 이익 배분, 대출은 이자·원금 회수, 기부는 보상이 없는 순수 기부를 목적으로 한다."}, {"question": "다음 중 O2O 커머스 플랫폼의 대표 사례로 옳게 짝지어진 것은?", "options": ["이노센티브와 칼 터너의 플로팅 하우스", "킥스타터와 패트리온", "우버(Uber)와 에어비앤비(Airbnb)", "페이팔과 알리페이"], "answer": 2, "explanation": "O2O 커머스의 대표 사례는 우버와 에어비앤비이다. A는 크라우드소싱, B는 크라우드펀딩, D는 핀테크 지급 결제 서비스 사례이다."}, {"question": "비트코인(Bitcoin)에 대한 설명으로 옳지 않은 것은?", "options": ["2009년 처음 등장했으며 사토시 나카모토 또는 Craig Wright가 만들었다고 알려져 있다.", "공급량은 4년에 한 번씩 절반으로 감소하도록 설계되어 있다.", "중앙 권력이나 중간 상인 없이 사용자에 의해 작동하는 분권화된 P2P 금융 네트워크이다.", "채굴자가 많아질수록 수학 연산의 난이도가 낮아져 채굴이 쉬워진다."], "answer": 3, "explanation": "채굴자가 많아지면 수학 연산의 난이도가 높아져 채굴이 어려워진다. 따라서 D가 틀린 설명이다. 나머지는 모두 비트코인에 대한 올바른 설명이다."}, {"question": "다음 중 핀테크 플랫폼의 '가상 통화' 분류와 그 설명이 바르게 연결된 것은?", "options": ["사이버 머니는 거래소를 통해 실물 화폐로 환전이 자유로운 완전한 화폐이다.", "글로벌 가상 통화는 비트코인·이더리움·리플 등이며 전 세계 누구와도 거래가 가능하다.", "OK 캐쉬백·네이버 캐쉬는 글로벌 가상 통화에 속한다.", "사이버 머니와 글로벌 가상 통화는 환전의 용이성에 차이가 없다."], "answer": 1, "explanation": "글로벌 가상 통화는 비트코인·이더리움·리플 등으로 전 세계 누구와도 거래가 가능하고 거래소를 통해 환전이 가능한 완전한 화폐이다. 사이버 머니(OK 캐쉬백·네이버 캐쉬 등)는 환전이 자유롭지 않아 완전한 화폐 역할이 부족하며, 두 분류는 환전 용이성에 차이가 있다."}], "fill": [{"question": "크라우드소싱은 ____가 2006년 IT 전문 잡지 「Wired」지에서 처음 소개한 개념으로, 대중(Crowd)과 아웃소싱(Outsourcing)의 합성어이다.", "answer": "제프 하우", "accept": ["Jeff Howe", "제프 하우(Jeff Howe)", "제프하우"], "explanation": "본문에서 크라우드소싱은 제프 하우(Jeff Howe)가 2006년 「Wired」지에서 처음 소개했다고 명시되어 있다."}, {"question": "크라우드펀딩의 대표 사례인 ____는 모금 기간 종료 시 총 모금액이 목표액에 도달해야만 자금을 전달하며, 오큘러스 리프트·페블 등의 성공 사례를 가진 매개형 플랫폼이다.", "answer": "킥스타터", "accept": ["Kickstarter", "킥스타터(Kickstarter)"], "explanation": "본문에서 킥스타터(Kickstarter)는 목표 모금액 도달 시에만 자금을 전달하며 오큘러스 리프트·페블이 성공 사례로 제시되어 있다."}, {"question": "에어비앤비는 2008년 8월 브라이언 체스키와 조 게비아가 창립한 세계 최대 숙박 공유 서비스로, 한 해 이용객이 4천만 명을 넘어 약 ____당 한 건씩 예약된다.", "answer": "2초", "accept": ["2초", "2 초"], "explanation": "본문에서 에어비앤비는 한 해 이용객이 4천만 명을 넘어 약 2초당 한 건씩 예약된다고 서술되어 있다."}, {"question": "비트코인의 공급량은 ____에 한 번씩 절반으로 감소하도록 설계되어 채산성을 낮추고 가치를 증가시킨다.", "answer": "4년", "accept": ["4년", "4 년", "사년"], "explanation": "본문에서 비트코인 공급량은 4년에 한 번씩 절반으로 감소하도록 설계되어 채산성을 낮추고 가치를 증가시킨다고 명시되어 있다."}]}];
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const LETTERS = ["A","B","C","D","E","F"];
const state = { mode:"summary", idx:0 };
const quizState = {}; // key `${idx}-${q}` -> selected option index
const fillState = {}; // key `${idx}-f${i}` -> {value, correct}

const main = document.getElementById("main");
const chapList = document.getElementById("chapList");

const norm = s => String(s).trim().toLowerCase().replace(/\s+/g,"");
function submitFill(fi){
  const c = DATA[state.idx], q = c.fill[fi], key = state.idx+"-f"+fi;
  if(key in fillState) return;
  const inp = main.querySelector('.fb-in[data-f="'+fi+'"]');
  const val = inp ? inp.value : "";
  if(norm(val)==="") return; // require an answer
  const cand = [q.answer].concat(q.accept||[]).map(norm);
  fillState[key] = { value: val, correct: cand.includes(norm(val)) };
  render();
}

function buildSidebar(){
  chapList.innerHTML = DATA.map((c,i)=>`
    <li><button class="chap${i===state.idx?' active':''}" data-idx="${i}">
      <span class="num">${c.number}</span>
      <span class="ctxt">${esc(c.title)}</span>
    </button></li>`).join("");
  chapList.querySelectorAll("button.chap").forEach(b=>{
    b.addEventListener("click",()=>{ state.idx = +b.dataset.idx; render(); window.scrollTo({top:0,behavior:"smooth"}); });
  });
}

function renderSummary(c){
  const secs = c.summary.map(s=>`
    <div class="sec">
      <h3>${esc(s.heading)}</h3>
      <ul class="points">${s.points.map(p=>`<li>${esc(p)}</li>`).join("")}</ul>
    </div>`).join("");
  const kw = `
    <div class="kw-wrap">
      <div class="kw-head">키워드 및 설명</div>
      <div class="kw-grid">
        ${c.keywords.map(k=>`<div class="kw"><div class="term">${esc(k.term)}</div><div class="desc">${esc(k.explanation)}</div></div>`).join("")}
      </div>
    </div>`;
  return secs + kw;
}

function renderQuiz(c){
  let answered=0, correct=0;
  c.quiz.forEach((q,qi)=>{ const k=state.idx+"-"+qi; if(k in quizState){answered++; if(quizState[k]===q.answer)correct++;} });
  const pct = c.quiz.length ? Math.round(answered/c.quiz.length*100) : 0;
  const bar = `
    <div class="quiz-bar">
      <div class="score">점수 <b>${correct}</b> / ${c.quiz.length}<span style="color:var(--faint);font-weight:500;font-size:13px;"> &nbsp;(푼 문제 ${answered})</span></div>
      <div class="progress"><i style="width:${pct}%"></i></div>
      <button class="btn" id="resetQuiz">↺ 다시 풀기</button>
    </div>`;
  const qs = c.quiz.map((q,qi)=>{
    const k = state.idx+"-"+qi;
    const done = k in quizState;
    const sel = quizState[k];
    const opts = q.options.map((o,oi)=>{
      let cls="opt";
      if(done){
        if(oi===q.answer) cls+=" correct";
        else if(oi===sel) cls+=" wrong";
        else cls+=" dim";
      }
      return `<button class="${cls}" data-q="${qi}" data-o="${oi}" ${done?"disabled":""}>
        <span class="mark">${LETTERS[oi]}</span><span class="otext">${esc(o)}</span></button>`;
    }).join("");
    const isCorrect = done && sel===q.answer;
    const lblCls = !done ? "" : (isCorrect ? "ok" : "bad");
    const lblTxt = !done ? "" : (isCorrect ? "✓ 정답입니다" : "✗ 오답입니다 — 정답: "+LETTERS[q.answer]);
    return `
      <div class="q">
        <div class="qhead"><span class="qno">Q${qi+1}</span><span class="qtext">${esc(q.question)}</span></div>
        <div class="opts" data-q="${qi}">${opts}</div>
        <div class="explain${done?" show":""}">
          <div class="lbl ${lblCls}">${lblTxt}</div>
          <div class="etext">${esc(q.explanation)}</div>
        </div>
      </div>`;
  }).join("");
  return bar + qs + renderFill(c);
}

function renderFill(c){
  if(!c.fill || !c.fill.length) return "";
  let answered=0, correct=0;
  c.fill.forEach((q,fi)=>{ const k=state.idx+"-f"+fi; if(k in fillState){answered++; if(fillState[k].correct)correct++;} });
  const pct = c.fill.length ? Math.round(answered/c.fill.length*100) : 0;
  const bar = `
    <div class="quiz-bar" style="margin-top:6px">
      <div class="score">빈칸 <b>${correct}</b> / ${c.fill.length}<span style="color:var(--faint);font-weight:500;font-size:13px;"> &nbsp;(푼 ${answered})</span></div>
      <div class="progress"><i style="width:${pct}%"></i></div>
      <button class="btn" id="resetFill">↺ 다시 풀기</button>
    </div>`;
  const items = c.fill.map((q,fi)=>{
    const k = state.idx+"-f"+fi;
    const done = k in fillState;
    const isC = done && fillState[k].correct;
    const val = done ? fillState[k].value : "";
    const parts = String(q.question).split(/_{2,}/);
    const before = esc(parts[0] || "");
    const after = parts.length>1 ? esc(parts.slice(1).join(" ")) : "";
    const inCls = "fb-in" + (done ? (isC ? " correct" : " wrong") : "");
    const input = `<input class="${inCls}" data-f="${fi}" type="text" value="${esc(val)}" placeholder="정답 입력" ${done?"disabled":""} autocomplete="off" spellcheck="false">`;
    const reveal = done ? `
        <div class="fb-ans ${isC?'ok':'bad'}">${isC?'✓ 정답':'✗ 오답'} · 정답: <b>${esc(q.answer)}</b></div>
        <div class="explain show"><div class="etext">${esc(q.explanation)}</div></div>` : "";
    return `
      <div class="fb">
        <div class="fb-q"><span class="qno">빈${fi+1}</span><span class="fb-text">${before}${input}${after?(" "+after):""}</span></div>
        ${done ? "" : `<button class="btn fb-check" data-f="${fi}">확인</button>`}
        ${reveal}
      </div>`;
  }).join("");
  return `<div class="kw-head" style="margin-top:26px">✏️ 빈칸 채우기</div>` + bar + items;
}

function renderPager(){
  const prev = state.idx>0 ? DATA[state.idx-1] : null;
  const next = state.idx<DATA.length-1 ? DATA[state.idx+1] : null;
  return `<div class="pager">
    <button class="prev" ${prev?"":"disabled"}>
      <div class="dir">◀ 이전 주제</div><div class="nm">${prev?esc(prev.number+". "+prev.title):"&nbsp;"}</div></button>
    <button class="next" ${next?"":"disabled"}>
      <div class="dir">다음 주제 ▶</div><div class="nm">${next?esc(next.number+". "+next.title):"&nbsp;"}</div></button>
  </div>`;
}

function render(){
  const c = DATA[state.idx];
  const modeLabel = state.mode==="summary" ? "내용정리" : "예시 문제";
  const body = state.mode==="summary" ? renderSummary(c) : renderQuiz(c);
  main.innerHTML = `
    <div class="page-head">
      <span class="kicker">주제 ${c.number}</span>
      <h2>${esc(c.title)}</h2>
      <span class="modepill">${modeLabel}</span>
    </div>
    ${body}
    ${renderPager()}`;

  // sidebar active state
  chapList.querySelectorAll("button.chap").forEach(b=>b.classList.toggle("active", +b.dataset.idx===state.idx));
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.mode===state.mode));

  if(state.mode==="quiz"){
    main.querySelectorAll(".opt").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const qi=+btn.dataset.q, oi=+btn.dataset.o, key=state.idx+"-"+qi;
        if(key in quizState) return;
        quizState[key]=oi; render();
      });
    });
    const rq=main.querySelector("#resetQuiz");
    if(rq) rq.addEventListener("click",()=>{
      DATA[state.idx].quiz.forEach((_,qi)=>{ delete quizState[state.idx+"-"+qi]; });
      render();
    });
    // fill-in-the-blank handlers
    main.querySelectorAll(".fb-check").forEach(btn=>{
      btn.addEventListener("click",()=>submitFill(+btn.dataset.f));
    });
    main.querySelectorAll(".fb-in").forEach(inp=>{
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); submitFill(+inp.dataset.f); } });
    });
    const rf=main.querySelector("#resetFill");
    if(rf) rf.addEventListener("click",()=>{
      (DATA[state.idx].fill||[]).forEach((_,fi)=>{ delete fillState[state.idx+"-f"+fi]; });
      render();
    });
  }
  const pv=main.querySelector(".pager .prev"), nx=main.querySelector(".pager .next");
  if(pv) pv.addEventListener("click",()=>{ if(state.idx>0){state.idx--; render(); window.scrollTo({top:0,behavior:"smooth"});} });
  if(nx) nx.addEventListener("click",()=>{ if(state.idx<DATA.length-1){state.idx++; render(); window.scrollTo({top:0,behavior:"smooth"});} });
}

document.getElementById("tabs").addEventListener("click",e=>{
  const t=e.target.closest(".tab"); if(!t) return;
  state.mode=t.dataset.mode; render(); window.scrollTo({top:0,behavior:"smooth"});
});

// ---------- reading aids ----------
const scrollbar=document.getElementById("scrollbar");
const toTop=document.getElementById("toTop");
function onScroll(){
  const h=document.documentElement, sc=h.scrollTop||document.body.scrollTop, max=(h.scrollHeight-h.clientHeight)||1;
  scrollbar.style.width=(sc/max*100)+"%";
  toTop.classList.toggle("show", sc>320);
}
window.addEventListener("scroll", onScroll, {passive:true});
window.addEventListener("resize", onScroll, {passive:true});
toTop.addEventListener("click", ()=>window.scrollTo({top:0, behavior:"smooth"}));

const FZ={s:0.92, m:1, l:1.12};
function setFz(k){
  if(!(k in FZ)) k="m";
  main.style.setProperty("--read", FZ[k]);
  document.querySelectorAll("#fz button").forEach(b=>b.classList.toggle("active", b.dataset.fz===k));
  try{ localStorage.setItem("fz4ir", k); }catch(e){}
}
document.querySelectorAll("#fz button").forEach(b=> b.addEventListener("click", ()=>setFz(b.dataset.fz)));
let savedFz="m"; try{ savedFz=localStorage.getItem("fz4ir")||"m"; }catch(e){}

buildSidebar();
render();
setFz(savedFz);
onScroll();
</script>
</body>
</html>
