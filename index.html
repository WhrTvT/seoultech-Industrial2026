<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>4차산업 핵심기술 개론 — 학습 정리 &amp; 예시 문제</title>
<style>
:root{
  --bg:#0b0f14; --bg-elev:#0f1620; --panel:#0f1620; --card:#141d28; --card-2:#172230;
  --border:#243140; --border-soft:#1b2632;
  --text:#e9eff5; --muted:#a7b6c4; --faint:#76889a; --text-soft:#c8d3df;
  --accent:#2dd4bf; --accent-strong:#5eead4; --accent-dim:rgba(45,212,191,.13); --accent-line:rgba(45,212,191,.35);
  --ok:#34d399; --ok-bg:rgba(52,211,153,.13); --ok-line:rgba(52,211,153,.45);
  --bad:#f87171; --bad-bg:rgba(248,113,113,.12); --bad-line:rgba(248,113,113,.45);
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(1200px 700px at 80% -10%, rgba(45,212,191,.08), transparent 60%), var(--bg);
  color:var(--text);
  font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
  line-height:1.78; font-size:16.5px; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  word-break:keep-all; overflow-wrap:anywhere;
}
a{color:var(--accent-strong);}
#scrollbar{position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,var(--accent),var(--accent-strong)); z-index:60; transition:width .1s linear;}
#toTop{position:fixed; right:22px; bottom:22px; width:44px; height:44px; border-radius:50%; border:1px solid var(--border); background:var(--panel); color:var(--accent-strong); font-size:19px; cursor:pointer; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .2s, transform .2s, border-color .13s; z-index:55;}
#toTop.show{opacity:1; pointer-events:auto;}
#toTop:hover{border-color:var(--accent-line); transform:translateY(-2px);}

/* ---------- Header ---------- */
header.top{
  position:sticky; top:0; z-index:50;
  background:rgba(11,15,20,.82); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.top-inner{max-width:1180px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;}
.brand{display:flex; flex-direction:column; gap:2px; margin-right:auto;}
.brand h1{font-size:17px; margin:0; font-weight:700; letter-spacing:-.2px;}
.brand .sub{font-size:12px; color:var(--faint);}
.brand .dot{color:var(--accent);}
.tabs{display:flex; gap:6px; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:5px;}
.tab{
  appearance:none; border:0; cursor:pointer; font:inherit; font-weight:600; font-size:14px;
  color:var(--muted); background:transparent; padding:8px 18px; border-radius:999px; transition:.15s;
}
.tab:hover{color:var(--text);}
.tab.active{background:var(--accent); color:#04201c; box-shadow:0 2px 12px rgba(45,212,191,.4);}
.fz{display:flex; gap:3px; align-items:center; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:4px;}
.fz button{appearance:none; border:0; background:transparent; color:var(--muted); cursor:pointer; font:inherit; font-weight:700; border-radius:999px; min-width:30px; height:28px; padding:0 6px; transition:.13s;}
.fz button:hover{color:var(--text);}
.fz button.active{background:var(--accent); color:#04201c;}

/* ---------- Layout ---------- */
.shell{max-width:1180px; margin:0 auto; padding:22px; display:grid; grid-template-columns:264px 1fr; gap:24px; align-items:start;}
nav.side{
  position:sticky; top:78px; align-self:start;
  background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:10px; box-shadow:var(--shadow);
  max-height:calc(100vh - 100px); overflow:auto;
}
.side .side-title{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); padding:8px 10px 6px;}
.side ul{list-style:none; margin:0; padding:0;}
.side li{margin:2px 0;}
.side button.chap{
  width:100%; text-align:left; cursor:pointer; font:inherit; color:var(--muted);
  background:transparent; border:0; border-radius:10px; padding:9px 11px; display:flex; gap:10px; align-items:flex-start; transition:.13s; line-height:1.4;
}
.side button.chap:hover{background:var(--card); color:var(--text);}
.side button.chap.active{background:var(--accent-dim); color:var(--accent-strong); font-weight:600;}
.side .num{flex:0 0 22px; height:22px; border-radius:6px; background:var(--card-2); color:var(--faint); font-size:12px; font-weight:700; display:grid; place-items:center;}
.side button.chap.active .num{background:var(--accent); color:#04201c;}
.side .ctxt{font-size:13.5px;}

main.content{min-width:0; --read:1;}

/* ---------- Content card ---------- */
.page-head{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin:2px 0 20px; padding-bottom:14px; border-bottom:1px solid var(--border-soft);}
.page-head .kicker{font-size:12px; font-weight:700; letter-spacing:.1em; color:var(--accent); text-transform:uppercase;}
.page-head h2{font-size:25px; margin:0; letter-spacing:-.4px; font-weight:750; line-height:1.3;}
.modepill{font-size:12px; color:var(--faint); border:1px solid var(--border); border-radius:999px; padding:3px 11px;}

.sec{
  background:linear-gradient(180deg, var(--card) 0%, var(--panel) 100%);
  border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px; margin-bottom:18px; box-shadow:var(--shadow);
}
.sec h3{margin:0 0 14px; font-size:17px; font-weight:700; letter-spacing:-.2px; display:flex; align-items:center; gap:10px;}
.sec h3::before{content:""; width:5px; height:19px; border-radius:3px; background:linear-gradient(var(--accent),var(--accent-strong)); flex:0 0 auto;}
.sec ul.points{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:13px;}
.sec ul.points li{position:relative; padding-left:24px; color:var(--text); font-size:calc(16px * var(--read,1)); line-height:1.8;}
.sec ul.points li::before{content:""; position:absolute; left:5px; top:13px; width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px var(--accent-dim);}

/* ---------- Keywords ---------- */
.kw-wrap{margin-top:6px;}
.kw-head{display:flex; align-items:center; gap:9px; margin:24px 2px 12px; font-size:16.5px; font-weight:700;}
.kw-head::before{content:"🔑"; font-size:16px;}
.kw-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px;}
.kw{background:var(--card); border:1px solid var(--border-soft); border-left:3px solid var(--accent); border-radius:11px; padding:15px 17px; transition:transform .15s, box-shadow .15s, border-color .15s;}
.kw:hover{border-left-color:var(--accent-strong); transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,.3);}
.kw .term{font-weight:700; color:var(--accent-strong); margin-bottom:6px; font-size:calc(15px * var(--read,1)); letter-spacing:-.1px;}
.kw .desc{font-size:calc(14.5px * var(--read,1)); color:var(--text-soft); line-height:1.72;}

/* ---------- Quiz ---------- */
.quiz-bar{display:flex; align-items:center; gap:14px; flex-wrap:wrap; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:13px 18px; margin-bottom:18px; box-shadow:var(--shadow);}
.quiz-bar .score{font-weight:700; font-size:15px;}
.quiz-bar .score b{color:var(--accent-strong); font-size:18px;}
.progress{flex:1; min-width:120px; height:8px; background:var(--card-2); border-radius:999px; overflow:hidden;}
.progress > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent-strong)); transition:width .35s;}
.btn{appearance:none; cursor:pointer; font:inherit; font-weight:600; font-size:13.5px; border-radius:9px; padding:8px 15px; border:1px solid var(--border); background:var(--card); color:var(--text); transition:.13s;}
.btn:hover{border-color:var(--accent-line); color:var(--accent-strong);}

.q{background:linear-gradient(180deg, var(--card) 0%, var(--panel) 100%); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:15px; box-shadow:var(--shadow);}
.q .qhead{display:flex; gap:11px; margin-bottom:14px;}
.q .qno{flex:0 0 auto; min-width:26px; height:26px; padding:0 7px; border-radius:7px; background:var(--accent-dim); color:var(--accent-strong); font-weight:700; font-size:13px; display:grid; place-items:center;}
.q .qtext{font-weight:650; font-size:calc(16px * var(--read,1)); line-height:1.7;}
.opts{display:flex; flex-direction:column; gap:9px;}
.opt{
  display:flex; gap:11px; align-items:flex-start; cursor:pointer; text-align:left; width:100%; font:inherit;
  background:var(--card-2); border:1.5px solid var(--border-soft); border-radius:11px; padding:11px 14px; color:var(--text); transition:.13s;
}
.opt:hover:not(:disabled){border-color:var(--accent-line); background:var(--accent-dim);}
.opt .mark{flex:0 0 24px; width:24px; height:24px; border-radius:50%; border:1.5px solid var(--faint); color:var(--faint); font-weight:700; font-size:12.5px; display:grid; place-items:center;}
.opt .otext{padding-top:1px; font-size:calc(15.5px * var(--read,1)); line-height:1.55;}
.opt:disabled{cursor:default;}
.opt.correct{border-color:var(--ok-line); background:var(--ok-bg);}
.opt.correct .mark{border-color:var(--ok); background:var(--ok); color:#04241a;}
.opt.wrong{border-color:var(--bad-line); background:var(--bad-bg);}
.opt.wrong .mark{border-color:var(--bad); background:var(--bad); color:#2a0b0b;}
.opt.dim{opacity:.55;}
.explain{margin-top:13px; border-radius:11px; padding:0 15px; max-height:0; overflow:hidden; background:var(--accent-dim); border:1px solid transparent; transition:max-height .3s ease, padding .3s ease, border-color .3s;}
.explain.show{max-height:700px; padding:14px 16px; border-color:var(--accent-line);}
.explain .lbl{font-weight:700; color:var(--accent-strong); font-size:13px; margin-bottom:4px; display:flex; align-items:center; gap:6px;}
.explain .lbl.ok{color:var(--ok);}
.explain .lbl.bad{color:var(--bad);}
.explain .etext{font-size:calc(14.5px * var(--read,1)); color:var(--text-soft); line-height:1.74;}

/* ---------- Fill-in-the-blank ---------- */
.fb{background:linear-gradient(180deg, var(--card) 0%, var(--panel) 100%); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; margin-bottom:13px; box-shadow:var(--shadow);}
.fb-q{display:flex; gap:11px; align-items:flex-start; margin-bottom:12px;}
.fb-text{font-size:calc(15.5px * var(--read,1)); line-height:2.1;}
.fb-in{display:inline-block; min-width:130px; margin:0 5px; padding:5px 11px; border-radius:8px; border:1.5px solid var(--accent-line); background:var(--card-2); color:var(--text); font:inherit; font-size:14.5px; vertical-align:baseline;}
.fb-in::placeholder{color:var(--faint);}
.fb-in:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim);}
.fb-in.correct{border-color:var(--ok-line); background:var(--ok-bg); color:var(--accent-strong); font-weight:600;}
.fb-in.wrong{border-color:var(--bad-line); background:var(--bad-bg); color:var(--bad); font-weight:600;}
.fb-check{margin-top:2px;}
.fb-ans{margin-top:12px; font-size:13.8px; font-weight:600;}
.fb-ans.ok{color:var(--ok);}
.fb-ans.bad{color:var(--bad);}
.fb-ans b{color:var(--accent-strong);}

/* ---------- Pager ---------- */
.pager{display:flex; justify-content:space-between; gap:12px; margin:22px 0 8px;}
.pager button{flex:1; max-width:48%; text-align:left; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:13px 16px; cursor:pointer; color:var(--text); font:inherit; transition:.13s;}
.pager button:hover:not(:disabled){border-color:var(--accent-line);}
.pager button:disabled{opacity:.35; cursor:default;}
.pager .dir{font-size:11.5px; color:var(--faint); letter-spacing:.08em;}
.pager .nm{font-weight:650; font-size:14px; margin-top:2px;}
.pager .next{text-align:right;}

footer.foot{max-width:1180px; margin:0 auto; padding:26px 22px 50px; color:var(--faint); font-size:12.5px; line-height:1.7; border-top:1px solid var(--border-soft);}

/* ---------- Responsive ---------- */
@media (max-width:900px){
  .shell{grid-template-columns:1fr; padding:14px;}
  nav.side{position:static; max-height:none; top:auto;}
  .side ul{display:flex; gap:7px; overflow-x:auto; padding-bottom:4px;}
  .side li{flex:0 0 auto;}
  .side .side-title{display:none;}
  .side button.chap{flex-direction:row; white-space:nowrap;}
  .side .ctxt{font-size:12.5px;}
  .top-inner{padding:11px 14px;}
  .brand{margin-right:0; width:100%;}
  .tabs{width:100%; justify-content:center;}
}
@media print{
  header.top,nav.side,.pager,.quiz-bar .btn,.tabs,#scrollbar,#toTop,.fz{display:none!important;}
  body{background:#fff; color:#000;}
  .sec,.q,.kw{box-shadow:none; border-color:#ccc; background:#fff;}
  .explain{max-height:none!important; padding:10px 12px!important; background:#f3f3f3;}
}
</style>
</head>
<body>
<div id="scrollbar"></div>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <h1>4차산업 핵심기술 개론 <span class="dot">·</span> 학습 노트</h1>
      <span class="sub">빅데이터 · 데이터 사이언스 · 인공지능 · 플랫폼 — 전체 11개 주제 정리 &amp; 예시 문제</span>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-mode="summary">📖 내용정리</button>
      <button class="tab" data-mode="quiz">✎ 예시 문제</button>
    </div>
    <div class="fz" id="fz" title="글자 크기 조절">
      <button data-fz="s">가-</button>
      <button data-fz="m">가</button>
      <button data-fz="l">가+</button>
    </div>
  </div>
</header>

<div class="shell">
  <nav class="side">
    <div class="side-title">주제 목록</div>
    <ul id="chapList"></ul>
  </nav>
  <main class="content" id="main"></main>
</div>

<footer class="foot">
  본 학습 자료는 강의 자료 「4차산업핵심기술개론」 PDF의 내용을 학습·시험 대비용으로 정리·재구성한 것입니다.
  내용정리·키워드·예시 문제 모두 원문 강의 자료에 기반합니다.
</footer>

<script>
const DATA = [{"id": "ch1", "number": 1, "title": "빅데이터의 이해와 시대적 배경", "summary": [{"heading": "빅데이터의 기본 개념과 정의", "points": ["빅데이터는 방대한 양의 데이터를 다양한 기술로 분석하여 숨겨진 가치를 찾아내는 것을 의미하며, 4차 산업혁명 시대의 핵심 동력으로 부상하고 있다.", "위키백과와 네이버 국어사전은 빅데이터를 기존 방법이나 도구로 수집, 저장, 검색, 시각화, 분석하기 어려운 방대한 양의 정형 또는 비정형 데이터 세트로 정의한다.", "과거 아날로그 데이터에 비해 규모가 방대하고, 생성 주기가 짧으며, 수치뿐 아니라 문자, 영상 데이터를 포함하는 대규모 데이터를 의미한다.", "위키백과는 기존 데이터베이스 관리 도구의 역량을 넘어서는 대량의 정형 및 비정형 데이터로부터 가치를 추출하고 분석하는 기술을 포함한다고 설명한다.", "빅데이터는 규모의 방대함, 다양한 종류, 신속한 생성 주기를 특징으로 하며, 새로운 가치 창출의 엔진이자 문제 해결의 새로운 방법으로 인식된다.", "빅데이터는 개방형 혁신, 플랫폼, 창의적 협업을 통해 새로운 성장 동력을 제공한다."]}, {"heading": "기관별 정의(McKinsey·IDC·Gartner)", "points": ["McKinsey & Company는 데이터의 규모에 초점을 맞춰 기존 데이터베이스 관리 도구의 저장, 수집, 관리, 분석 역량을 넘어서는 데이터를 빅데이터로 정의한다.", "IDC(Internet Data Centre)는 업무 방식에 초점을 맞춰 대규모 데이터를 저렴하게 수집, 발굴, 분석하여 지원하도록 고안된 기술로 정의한다.", "Gartner는 크기, 다양성, 속도의 3가지 관점에서 빅데이터 기술을 정의한다.", "협의의 빅데이터는 3V 특성을 갖는 대량의 데이터를 효율적으로 처리하고 분석하기 위한 기술을 의미한다.", "광의의 빅데이터는 데이터 처리 및 축적 기술, 데이터 분석 기술, 데이터 전문가(데이터 사이언티스트 등)를 포괄하는 개념이다."]}, {"heading": "빅데이터의 3V 특성과 가치(Value)", "points": ["크기(Volume): 테라바이트에서 수십 페타/엑사/제타 수준으로 데이터 양이 방대하며, 분석 품질을 좌우한다.", "다양성(Variety): 구조화된 데이터베이스뿐만 아니라 정형, 비정형 데이터를 모두 포함한다.", "속도(Velocity): 배치 분석에서 실시간 파이프라인으로 변화하며, 데이터 생성 및 처리 속도가 매우 빠르다.", "정형 데이터(Structured data)는 숫자, 텍스트처럼 형태와 구조가 정형화된 데이터이고, 비정형 데이터(Unstructured data)는 잡지, 문서, 의료 기록, 메신저, 음성·영상 정보, 사진, 스마트폰 위치 정보, 통화 내용 등 형태를 예상할 수 없는 데이터이다.", "모든 데이터가 실시간 처리를 요구하는 것은 아니며, 대량 데이터를 다양한 기법으로 분석·표현하는 과정에서 장기적이고 전략적인 접근이 필요하다.", "빅데이터는 크기(Volume), 다양성(Variety), 속도(Velocity)의 3V 특성에 더해 가치(Value)를 포함한다."]}, {"heading": "데이터 규모(Volume)의 이해", "points": ["1 요타바이트(YB)는 1024 제타바이트(ZB)에 해당하며, 이는 로드아일랜드주와 델라웨어주를 데이터 센터로 채울 수 있는 엄청난 양이다.", "1 요타바이트를 구매하는 데 약 100조 달러(약 11경 350조 원)가 소요될 것으로 추정된다.", "1 페타바이트(PB)는 영화 17만 4천 편을 수록할 수 있는 용량이다."]}, {"heading": "4차 산업혁명과 빅데이터 시대 도래 배경", "points": ["2011년 독일의 인더스트리 4.0(Industrie 4.0)이 대두되며 4차 산업혁명이 시작되었고, 4차 산업혁명은 정보통신기술이 제조업과 융합되는 단계를 의미한다.", "2016년 스위스 다보스 포럼의 주제가 '제4차 산업혁명의 이해'였으며, 현재 우리는 4차 산업혁명의 시작점에 서 있다.", "디지털화, 인공지능, 자율주행, IoT(사물 인터넷)의 발전으로 전 세계 정보량이 기하급수적으로 증가하고 있다.", "2011년 전 세계 디지털 정보량은 1.8 제타바이트(ZB)에 달했으며, 이는 고화질 영화 2천억 개 이상을 4천7백만 년 동안 시청할 수 있는 양이다.", "2020년에는 관리해야 할 정보의 양이 2011년 대비 50배 이상 증가할 것으로 예상된다.", "데이터 유형은 정형 데이터(데이터베이스, 사무 정보)에서 비정형 데이터(이메일, 멀티미디어, SNS) 및 인지 정보 데이터(RFID, 센서, 사물 통신)로 확장되었으며, 데이터 특성은 구조화·복합성·현실성·실시간성·다양성·소셜 특성을 갖게 되었다."]}, {"heading": "데이터 빅뱅과 시장·성장 동력", "points": ["소셜 미디어의 등장으로 데이터가 급증했으며, 2012년에는 1.8조 기가바이트의 데이터가 생성되었다.", "빅데이터 기술·서비스·장비 시장은 2012년 47억 달러에서 2015년 169억 달러로 성장할 것으로 예측되며, 2015년까지 440만 개의 일자리가 생겨날 것으로 전망된다.", "2014년 미래창조과학부는 9대 전략 산업 중 하나로 지능형 빅데이터 기반 산업을 선정했다.", "매일 2.5 퀸틸리언(10^18) 바이트의 데이터가 생성되며, 최근 2년 안에 생성된 데이터가 전체 데이터의 90% 이상을 차지한다.", "모바일 기기 빅뱅으로 무선 디바이스 연결이 2010년 100억 개에서 2017년 7조 개로 폭증했고, 데이터 양은 2010년 800 엑사바이트(EB)에서 2020년 35 제타바이트(ZB)로 확대될 것으로 예상된다.", "빅데이터를 위한 고급 분석 기술은 현재 발생 단계(Technology Trigger)이며 향후 2~5년 후에 성숙될 것으로 평가되고, 디지털 정보량은 2007년부터 사용 가능한 저장 공간을 초과하기 시작해 2011년 '제타바이트 시대'로 진입했다."]}], "keywords": [{"term": "빅데이터(Big Data)", "explanation": "기존 방법이나 도구로 수집·저장·검색·시각화·분석하기 어려운 방대한 양의 정형 또는 비정형 데이터 세트, 또는 그로부터 가치를 추출·분석하는 기술을 의미한다."}, {"term": "3V (Volume·Variety·Velocity)", "explanation": "Gartner가 제시한 빅데이터의 3가지 관점으로 크기, 다양성, 속도를 가리키며, 여기에 가치(Value)를 더해 빅데이터를 종합적으로 정의한다."}, {"term": "크기(Volume)", "explanation": "테라바이트에서 수십 페타·엑사·제타 수준에 이르는 방대한 데이터 양을 의미하며, 데이터 양은 분석 품질을 좌우한다."}, {"term": "다양성(Variety)", "explanation": "구조화된 데이터베이스뿐 아니라 정형 데이터와 비정형 데이터를 모두 포함한다는 특성으로, 데이터의 형태가 다양함을 의미한다."}, {"term": "속도(Velocity)", "explanation": "데이터의 생성 및 처리 속도가 매우 빠른 특성으로, 배치 분석에서 실시간 파이프라인으로 변화하고 있다."}, {"term": "정형 데이터(Structured data)와 비정형 데이터(Unstructured data)", "explanation": "정형 데이터는 숫자·텍스트처럼 형태와 구조가 정형화된 데이터이며, 비정형 데이터는 문서·메신저·음성·영상·사진·위치 정보 등 형태를 예상할 수 없는 데이터이다."}, {"term": "인더스트리 4.0(Industrie 4.0)", "explanation": "2011년 독일에서 대두된 개념으로, 정보통신기술이 제조업과 융합되는 단계인 4차 산업혁명의 시작을 알렸다."}, {"term": "요타바이트(YB)·제타바이트(ZB)", "explanation": "1 요타바이트는 1024 제타바이트에 해당하는 거대한 데이터 단위이며, 2011년 전 세계 디지털 정보량은 1.8 제타바이트에 달했다."}, {"term": "데이터 빅뱅(BIG BANG)", "explanation": "매일 2.5 퀸틸리언(10^18) 바이트의 데이터가 생성되고 최근 2년간 생성된 데이터가 전체의 90% 이상을 차지하는, 모바일 기기와 데이터 양의 폭발적 증가 현상을 가리킨다."}, {"term": "지능형 빅데이터 기반 산업", "explanation": "2014년 미래창조과학부가 9대 전략 산업 중 하나로 선정한 분야로, 창조적·융합형 성장과 주력 산업 고도화를 통한 미래 신시장 선점을 목표로 한다."}], "quiz": [{"question": "Gartner가 제시한 빅데이터의 3V 특성에 해당하지 않는 것은?", "options": ["크기(Volume)", "다양성(Variety)", "속도(Velocity)", "검증성(Verification)"], "answer": 3, "explanation": "Gartner는 크기(Volume), 다양성(Variety), 속도(Velocity)의 3가지 관점에서 빅데이터를 정의하며, '검증성(Verification)'은 3V에 포함되지 않는다. 여기에 가치(Value)를 더해 광의의 빅데이터를 종합 정의한다."}, {"question": "빅데이터에 대한 기관별 정의 연결로 옳은 것은?", "options": ["McKinsey는 업무 방식에 초점을 맞춰 정의한다.", "IDC는 데이터의 규모에 초점을 맞춰 정의한다.", "McKinsey는 데이터의 규모에 초점을 맞춰 기존 데이터베이스 관리 도구의 역량을 넘어서는 데이터로 정의한다.", "Gartner는 데이터를 저렴하게 수집·발굴·분석하는 기술로 정의한다."], "answer": 2, "explanation": "McKinsey & Company는 데이터의 규모에 초점을 맞춰 기존 데이터베이스 관리 도구의 저장·수집·관리·분석 역량을 넘어서는 데이터로 빅데이터를 정의한다. 업무 방식에 초점을 둔 것은 IDC, 3가지 관점으로 정의한 것은 Gartner이다."}, {"question": "다음 중 비정형 데이터(Unstructured data)에 해당하는 것은?", "options": ["정형화된 숫자 데이터", "구조화된 데이터베이스 테이블", "메신저·음성·영상 정보 등 형태를 예상할 수 없는 데이터", "형태와 구조가 정형화된 텍스트 데이터"], "answer": 2, "explanation": "비정형 데이터는 잡지, 문서, 의료 기록, 메신저, 음성·영상 정보, 사진, 위치 정보 등 구조화되어 있지 않아 형태를 예상할 수 없는 데이터이다. 정형화된 숫자·텍스트와 구조화된 데이터베이스는 정형 데이터에 속한다."}, {"question": "4차 산업혁명과 빅데이터 시대 배경에 대한 설명으로 옳은 것은?", "options": ["4차 산업혁명은 2011년 독일의 인더스트리 4.0(Industrie 4.0) 대두와 함께 시작되었다.", "2016년 다보스 포럼의 주제는 '제3차 산업혁명의 이해'였다.", "2011년 전 세계 디지털 정보량은 1.8 엑사바이트(EB)에 달했다.", "2020년에는 관리할 정보량이 2011년 대비 5배 증가할 것으로 예상되었다."], "answer": 0, "explanation": "4차 산업혁명은 2011년 독일의 인더스트리 4.0이 대두되며 시작되었다. 2016년 다보스 포럼 주제는 '제4차 산업혁명의 이해'였고, 2011년 디지털 정보량은 1.8 제타바이트(ZB)였으며, 2020년 정보량은 2011년 대비 50배 이상 증가할 것으로 예상되었다."}, {"question": "데이터 규모(Volume)에 대한 수치 설명으로 옳은 것은?", "options": ["1 요타바이트(YB)는 1024 페타바이트(PB)에 해당한다.", "1 페타바이트(PB)는 영화 17만 4천 편을 수록할 수 있는 용량이다.", "1 요타바이트 구매 비용은 약 100억 달러로 추정된다.", "1 요타바이트(YB)는 1024 엑사바이트(EB)에 해당한다."], "answer": 1, "explanation": "1 페타바이트(PB)는 영화 17만 4천 편을 수록할 수 있는 용량이다. 1 요타바이트(YB)는 1024 제타바이트(ZB)에 해당하며, 그 구매 비용은 약 100조 달러(약 11경 350조 원)로 추정된다."}], "fill": [{"question": "Gartner는 크기(Volume), 다양성(Variety), 속도(Velocity)라는 ____ 특성의 3가지 관점에서 빅데이터를 정의하였다.", "answer": "3V", "accept": ["3V (Volume·Variety·Velocity)", "쓰리브이"], "explanation": "Gartner는 크기·다양성·속도의 3가지 관점, 즉 3V로 빅데이터를 정의한다."}, {"question": "2011년 독일에서 정보통신기술이 제조업과 융합되는 단계인 ____ 가 대두되며 4차 산업혁명이 시작되었다.", "answer": "인더스트리 4.0", "accept": ["Industrie 4.0", "인더스트리4.0", "Industry 4.0"], "explanation": "2011년 독일의 인더스트리 4.0(Industrie 4.0) 대두와 함께 4차 산업혁명이 시작되었다."}, {"question": "1 요타바이트(YB)는 ____ 제타바이트(ZB)에 해당하며, 이를 구매하는 데 약 100조 달러가 소요될 것으로 추정된다.", "answer": "1024", "accept": ["1,024"], "explanation": "1 요타바이트(YB)는 1024 제타바이트(ZB)에 해당한다고 본문에 명시되어 있다."}, {"question": "2014년 ____ 는 9대 전략 산업 중 하나로 지능형 빅데이터 기반 산업을 선정하였다.", "answer": "미래창조과학부", "accept": ["미래 창조 과학부"], "explanation": "2014년 미래창조과학부가 9대 전략 산업 중 하나로 지능형 빅데이터 기반 산업을 선정했다."}]}, {"id": "ch2", "number": 2, "title": "데이터 패러다임의 변화와 통찰력", "summary": [{"heading": "데이터 패러다임의 진화", "points": ["데이터 패러다임은 단순한 저장과 관리에서 벗어나 분석과 통찰력을 통해 새로운 가치를 창출하는 방향으로 변화하고 있다.", "진화 단계는 전통적 ICT(단순 저장) → 빅데이터·AI(분석과 통찰) → 융복합 혁신(가치 창출)으로 이어진다.", "이러한 흐름은 데이터 축적, 지능형 연결, 학문적 융합으로 요약되며 사회경제적 가치 제고와 신융합 세상의 학습을 가능하게 한다."]}, {"heading": "정보통신기술(ICT) 시대의 변화와 패러다임", "points": ["PC 시대의 주요 패러다임은 디지털화, 온라인화, 전산화, 정보화였다.", "인터넷 시대에는 웹 2.0, 모바일화, 소셜화가 진행되었다.", "스마트 시대에는 사물 인터넷(IoT), 인공지능(AI), 지능화, 사물 정보화가 핵심 패러다임으로 부상했다.", "핵심 서비스는 PC 시대(PC 통신·웹 서버·PC OS) → 인터넷 시대(초고속 인터넷·데이터베이스·검색 엔진) → 스마트 시대(모바일 인터넷·스마트폰·사물 네트워크·앱 서비스·개인 맞춤형 서비스)로 변화했다.", "리더 기업은 PC 시대 Microsoft, 인터넷 시대 Google·NAVER, 스마트 시대 Facebook·Twitter·IBM·SAMSUNG으로 바뀌었다."]}, {"heading": "데이터의 새로운 통찰력과 가치 창출", "points": ["데이터 패러다임은 과거(DB 축적 중심) → 현재(검색·관리를 통한 공유 및 확산) → 미래(빅데이터 기반 분석·추론·상황 인식을 통한 가치 창출)로 변화한다.", "통찰력(Insight)은 사물이나 현상을 꿰뚫어 살펴 감추어진 핵심 내용을 직관적으로 파악하는 능력이다.", "빅데이터 시대에는 새로운 통찰력이 필요하며, 이는 데이터 기반 비즈니스에서 중요한 역할을 한다.", "데이터는 경제적 자산이자 가치 창출의 원천이 되는 시대로 변화했다."]}, {"heading": "지식 성숙도(Web 1.0~3.0)와 데이터 가치 평가", "points": ["Web 1.0(60-80년대)은 HW 중심·폐쇄형·정보 전달(홈페이지·게시판)이 특징이다.", "Web 2.0(90-00년대)은 SW 중심·개방형·집단 지성(블로그·위키·P2P)이 특징이다.", "Web 3.0(10년대 이후)은 데이터 중심·지능화·정보 분석/예측이 특징이며 용량·속도·편리성·안정성·참여·분석·전달·소통·예측 등의 가치를 제공한다.", "Economist(2010)는 데이터가 자본·노동력과 동등한 경제적 투입 자본이자 비즈니스의 새로운 원자재라고 강조했다.", "Gartner(2011)는 21세기 데이터는 원유와 같으며 데이터가 미래 경쟁 우위를 좌우한다고 보았다.", "McKinsey(2011)는 빅데이터가 혁신·경쟁력·생산성의 핵심 요소이며 의료·공공 행정 등 5대 분야에서 6천억 달러 이상의 가치를 창출할 수 있다고 분석했다.", "美 대통령 과학기술자문위는 데이터를 지식으로, 지식을 행동으로 변환하는 전략에 집중해야 한다고 주장했고, 싱가포르는 데이터 기반의 위협 리스크 평가와 환경 변화 탐지를 강조했다."]}, {"heading": "빅데이터의 새로운 가치 창출 가능성", "points": ["가치 창출의 원동력은 IT 패러다임 변화(기술 발달과 저장 매체·대역폭·속도의 경제적 비용 저하)로 데이터 생성·수집·관리가 용이해진 점이다.", "소셜 네트워크 발달과 그림자 정보, 사물 정보 증가로 데이터가 양적·질적으로 팽창하며 빅데이터 서비스가 출현했다.", "데이터 가공 및 분석을 통한 新 가치 창출은 신산업·신성장 동력·문제 해결을 견인한다.", "신융합 세상의 학습(Convergence)에서는 정부·대학·기업 등 다양한 주체가 융합을 통해 미래 사회의 특징을 학습한다.", "빅데이터의 역할은 현실 세계 미래 전망, 리스크 대응력, 스마트 경쟁력, 융합 창조력으로 나타나 불확실성을 줄이고 실시간 의사 결정과 차세대 사업 모델 발굴을 지원한다."]}, {"heading": "융합 현실과 세상 변화의 본질", "points": ["선진국 융합 산업 테마는 미국(차세대 에너지·테러 예방 감지·신항공·연료 전지·군사용 무인 전투기·나노/바이오 디자인·Wearable·인공 안구 및 장기 등), 일본(플렉시블 디스플레이·언어 커뮤니케이션 프로세싱·신기능 재료), EU(U-Learning·인텔리전트 주거·환경/에너지·두뇌 인지력 증진 게임·초전도 멀티 플랫폼)로 제시되었다.", "우리나라 미래부 신산업 창조 신규 과제(2014)는 창조 교육(클라우드 시뮬레이션·사물 인터넷·실감형 콘텐츠·3D 프린팅 등)과 신산업(심혈관 서비스 빅데이터·3D 의료 이식형 프린팅·체내 바이오 센서·사물 인터넷 시스템 등)으로 선정되었다.", "세상 변화의 본질은 융합을 통한 인간 삶의 질 향상으로, 건강 기술(인간을 위한 기술), 지속 가능한 사회(환경을 위한 기술), 스마트하고 안전한 사회(기술을 위한 기술)로 구분된다."]}], "keywords": [{"term": "통찰력(Insight)", "explanation": "사물이나 현상을 꿰뚫어 살펴 감추어진 핵심 내용을 직관적으로 파악하는 능력으로, 빅데이터 시대 데이터 기반 비즈니스에서 핵심적인 역할을 한다."}, {"term": "데이터 패러다임의 진화", "explanation": "전통적 ICT(단순 저장)에서 빅데이터·AI(분석과 통찰)를 거쳐 융복합 혁신(가치 창출)으로 이어지는 데이터 활용 방식의 변화 흐름이다."}, {"term": "Web 1.0 / 2.0 / 3.0", "explanation": "지식 성숙도의 변화 단계로, Web 1.0은 HW 중심·폐쇄형·정보 전달, Web 2.0은 SW 중심·개방형·집단 지성, Web 3.0은 데이터 중심·지능화·정보 분석/예측이 특징이다."}, {"term": "집단 지성", "explanation": "Web 2.0의 대표 특징으로 블로그, 위키, P2P 등을 통해 다수가 협력하여 지식을 생산·공유하는 개방형 방식이다."}, {"term": "사물 인터넷(IoT)", "explanation": "스마트 시대의 핵심 패러다임 중 하나로, 인공지능·지능화·사물 정보화와 함께 사물이 네트워크로 연결되어 정보를 주고받는 기술이다."}, {"term": "신융합 세상의 학습(Convergence)", "explanation": "정부·대학·기업 등 사회의 다양한 주체가 융합을 통해 미래 사회의 특징을 학습하는 것으로, 현실 세계 미래 전망·리스크 대응력·스마트 경쟁력·융합 창조력으로 구현된다."}, {"term": "데이터의 사회경제적 가치", "explanation": "데이터가 자본·노동력과 동등한 경제적 투입 자본이자 비즈니스의 새로운 원자재(Economist), 21세기 원유(Gartner)로 평가받으며 가치 창출의 원천이 되는 개념이다."}, {"term": "그림자 정보", "explanation": "소셜 네트워크 발달과 함께 증가한 정보로, 사물 정보와 더불어 데이터의 양적·질적 팽창을 일으켜 빅데이터 서비스 출현의 배경이 되었다."}], "quiz": [{"question": "스마트 시대의 핵심 패러다임으로 가장 적절한 것은?", "options": ["디지털화, 온라인화, 전산화, 정보화", "웹 2.0, 모바일화, 소셜화", "사물 인터넷(IoT), 인공지능(AI), 지능화, 사물 정보화", "PC 통신, 웹 서버, PC OS"], "answer": 2, "explanation": "스마트 시대의 핵심 패러다임은 사물 인터넷(IoT), 인공지능(AI), 지능화, 사물 정보화이다. A는 PC 시대 패러다임, B는 인터넷 시대 패러다임, D는 PC 시대의 주요 이슈·핵심 서비스에 해당한다."}, {"question": "데이터의 가치에 대한 주요 기관의 평가가 잘못 연결된 것은?", "options": ["Economist(2010): 데이터는 자본·노동력과 동등한 경제적 투입 자본이자 새로운 원자재", "Gartner(2011): 21세기 데이터는 원유와 같으며 미래 경쟁 우위를 좌우", "McKinsey(2011): 빅데이터는 혁신·경쟁력·생산성의 핵심 요소이며 5대 분야에서 6천억 달러 이상 가치 창출", "Gartner(2011): 의료·공공 행정 등 5대 분야에서 6천억 달러 이상의 가치 창출"], "answer": 3, "explanation": "5대 분야에서 6천억 달러 이상 가치 창출 분석은 Gartner가 아니라 McKinsey(2011)의 평가이다. Gartner(2011)는 데이터를 21세기 원유에 비유한 기관이다."}, {"question": "Web 1.0, 2.0, 3.0의 특징 연결이 옳은 것은?", "options": ["Web 1.0: 데이터 중심, 지능화, 정보 분석/예측", "Web 2.0: SW 중심, 개방형, 집단 지성(블로그·위키·P2P)", "Web 3.0: HW 중심, 폐쇄형, 정보 전달", "Web 2.0: HW 중심, 폐쇄형, 홈페이지·게시판"], "answer": 1, "explanation": "Web 2.0(90-00년대)은 SW 중심·개방형·집단 지성(블로그·위키·P2P)이 특징이다. 데이터 중심·지능화·정보 분석/예측은 Web 3.0, HW 중심·폐쇄형·정보 전달(홈페이지·게시판)은 Web 1.0의 특징이다."}, {"question": "통찰력(Insight)에 대한 설명으로 옳은 것은?", "options": ["데이터를 단순히 저장하고 관리하는 기술적 능력이다.", "사물이나 현상을 꿰뚫어 살펴 감추어진 핵심 내용을 직관적으로 파악하는 능력이다.", "검색 엔진과 KMS를 통해 데이터를 공유·확산하는 절차이다.", "데이터를 원유에 비유한 Gartner의 비즈니스 전략이다."], "answer": 1, "explanation": "통찰력(Insight)은 사물이나 현상을 꿰뚫어 살펴 감추어진 핵심 내용을 직관적으로 파악하는 능력이며, 빅데이터 시대에 데이터 기반 비즈니스에서 중요한 역할을 한다."}, {"question": "데이터 패러다임의 변화(과거-현재-미래)에 대한 설명으로 옳지 않은 것은?", "options": ["과거에는 데이터 저장(DB 축적)에 중점을 두었다.", "현재는 검색(검색 엔진·Web 2.0)과 관리(KMS)를 통해 공유 및 확산이 이루어진다.", "미래에는 빅데이터를 통해 분석·추론·상황 인식을 거쳐 가치 창출이 이루어진다.", "미래에는 데이터를 폐쇄형으로 저장만 하고 분석은 배제한다."], "answer": 3, "explanation": "미래에는 빅데이터를 통한 분석·추론·상황 인식을 거쳐 가치 창출이 이루어진다. 폐쇄형 저장만 하고 분석을 배제한다는 설명은 본문과 정반대이므로 옳지 않다."}], "fill": [{"question": "사물이나 현상을 꿰뚫어 살펴 감추어진 핵심 내용을 직관적으로 파악하는 능력을 ____(이)라고 하며, 빅데이터 시대 데이터 기반 비즈니스에서 핵심적인 역할을 한다.", "answer": "통찰력", "accept": ["Insight", "통찰력(Insight)", "인사이트"], "explanation": "본문에서 통찰력(Insight)을 사물·현상을 꿰뚫어 감추어진 핵심을 직관적으로 파악하는 능력으로 정의한다."}, {"question": "____(2011)는 빅데이터가 혁신·경쟁력·생산성의 핵심 요소이며 의료·공공 행정 등 5대 분야에서 6천억 달러 이상의 가치를 창출할 수 있다고 분석했다.", "answer": "McKinsey", "accept": ["맥킨지", "매킨지"], "explanation": "5대 분야 6천억 달러 이상 가치 창출 분석은 McKinsey(2011)의 평가로 본문에 명시되어 있다."}, {"question": "Web ____은(는) SW 중심·개방형·집단 지성이 특징이며 블로그·위키·P2P를 대표 사례로 한다.", "answer": "2.0", "accept": ["Web 2.0", "2", "이점영"], "explanation": "본문에서 Web 2.0(90-00년대)을 SW 중심·개방형·집단 지성(블로그·위키·P2P)으로 설명한다."}, {"question": "Gartner(2011)는 21세기 데이터는 ____와(과) 같으며 데이터가 미래 경쟁 우위를 좌우한다고 보았다.", "answer": "원유", "accept": ["석유", "oil"], "explanation": "본문에서 Gartner(2011)는 21세기 데이터를 원유에 비유하며 미래 경쟁 우위를 좌우한다고 평가했다."}]}, {"id": "ch3", "number": 3, "title": "데이터 사이언스와 데이터 사이언티스트", "summary": [{"heading": "데이터 사이언스란 무엇인가", "points": ["데이터 사이언스는 통계학, 컴퓨터 과학, 도메인 전문 지식을 융합하여 빅데이터에서 가치를 추출하는 학문이다.", "통계학, 컴퓨터 과학, 도메인 지식의 3대 핵심 역량이 융합되어 인사이트를 추출하고 의사결정을 최적화한다.", "디지털화와 센서로 인해 데이터가 폭발적으로 증가하고, 지금까지 생성된 데이터의 90%가 최근 2년 안에 만들어졌다.", "오늘날 경제의 대부분은 10년 전에는 상상할 수 없을 정도로 데이터에 의존하며, 기업들은 축적된 데이터에서 사업적 정보를 얻는 데 어려움을 겪고 있다.", "데이터 사이언스는 비즈니스, 헬스케어, 정부, 학계 등 다양한 산업을 혁신할 잠재력을 가진다."]}, {"heading": "데이터 사이언스의 역할과 구성", "points": ["데이터 사이언스는 데이터를 통찰력으로 전환하여 새로운 정부 정책, 사업 방식의 변화 등을 유도할 수 있다.", "통계학, 컴퓨터 사이언스, 응용 수학을 활용해 이동 기기 등으로부터 전례 없는 규모와 속도로 데이터를 수집하고 빅데이터를 생성한다.", "소셜 네트워크, 전자상거래 사이트, 센서, 스마트 모바일 네트워크, 스마트 미터 등에서 데이터가 수집된다.", "전 세계 데이터의 90%가 지난 2년 동안 생성되었으며, 2016년에는 2.7조 달러 규모의 전자상거래 거래가 발생했다.", "주요 기술로 확률 모형, 통계적 학습, 기계 학습, 시각화, 데이터 공학, 신호 처리, 패턴 인식, 인공지능, 데이터 마이닝 등이 포함된다.", "구성 요소는 도메인 전문 지식, 통계학, 컴퓨터 과학, 기계 학습이 융합된 영역이다."]}, {"heading": "데이터 사이언티스트란 무엇인가", "points": ["데이터 사이언티스트는 데이터를 정리·가시화할 수 있도록 데이터를 수집, 분석, 조사하는 전문가이다.", "빅데이터에서 의미 있는 발견을 할 수 있도록 훈련된 전문가로, 정형·비정형 데이터를 다룬다.", "프로그래밍 능력과 통계 분석 능력을 갖추고 새로운 해결 방법을 모색한다.", "소프트웨어 공학자보다 통계학에 능하고, 통계학자보다 소프트웨어 공학에 유능해야 한다.", "구글 수석 경제학자 할 베리언(Hal Varian)은 데이터를 이해·처리·시각화·전달하고 가치를 뽑아내는 능력이 앞으로 10년간 매우 중요해질 것이라고 말했다."]}, {"heading": "데이터 사이언티스트의 역량과 핵심 기술", "points": ["데이터 사이언티스트가 지녀야 할 8가지 핵심 기술은 기본 도구(R, SQL), 기본 통계, 기계 학습, 다변량 분석, 커뮤니케이션, 시각화, 데이터 멍징(데이터 전처리), 소프트웨어 공학이다.", "이론적 지식(HARD Skill)으로 빅데이터에 대한 이론적 지식과 분석 기술 숙련이 필요하다.", "커뮤니케이션 능력(SOFT Skill)으로 설득력 있는 전달, 협력, 스토리텔링, 시각화가 필수적이다.", "창의적 사고로 호기심, 논리적 비판, 통찰력 있는 사고가 중요하다.", "수학·통계학, 공학 등 다양한 학문 분야의 지식이 요구되는 융합적 역량이 필요하다.", "지저분한(비정형) 데이터를 다루며, 수학·통계학·프로그래밍 지식으로 데이터를 정리·가공하고 숨겨진 해결책을 찾아 기존 가정을 재평가한다."]}, {"heading": "수요·연봉과 직업 전망", "points": ["데이터 전문가 수요가 급증하지만 공급은 제한적이어서 급여가 상승하고 있다.", "약 4백만~5백만 명의 데이터 전문가가 필요하며, 이 중 150만 명은 고급 빅데이터 분석가/관리자이다.", "데이터 사이언티스트는 2016년 미국에서 가장 높은 급여를 받는 직업 중 16위, 가장 수요가 많은 직업 중 1위를 차지했다.", "2015년 기준 평균 연봉은 약 11만 8천 달러(약 1억 3천 6백만 원), 최고 14만 8천 달러(약 1억 7천만 원)이며, 실리콘밸리 초급 전문가는 다른 지역보다 22% 더 많이 받는다.", "CNN은 2012년 데이터 사이언티스트를 최고 신규 직종으로, 하버드 비즈니스 리뷰는 '가장 매력적인' 21세기의 직종으로 선정했다.", "맥킨지 보고서에 따르면 2018년까지 미국에서만 14만~19만 명의 데이터 전문가와 150만 명의 데이터 분석 관리자가 추가로 필요할 것으로 분석되었다.", "EMC 조사 결과 '스킬 또는 훈련의 부족'이 인재 부족의 가장 높은 요인으로 꼽혔고, 인포월드가 선정한 각광받는 IT 직업 6가지 중 하나로 데이터 과학자가 포함되었다."]}], "keywords": [{"term": "데이터 사이언스(Data Science)", "explanation": "통계학, 컴퓨터 과학, 도메인 전문 지식을 융합하여 빅데이터에서 가치를 추출하는 학문이다."}, {"term": "데이터 사이언티스트(Data Scientist)", "explanation": "데이터를 수집·분석·조사하여 정리·가시화하고, 빅데이터에서 의미 있는 발견을 하도록 훈련된 전문가이다."}, {"term": "3대 핵심 역량의 융합", "explanation": "통계학, 컴퓨터 과학, 도메인 지식이 융합되어 인사이트를 추출하고 의사결정을 최적화하는 데이터 사이언스의 기반이다."}, {"term": "데이터 멍징(Data Munging)", "explanation": "분석에 앞서 데이터를 정리·가공하는 데이터 전처리 작업으로, 데이터 사이언티스트의 8가지 핵심 기술 중 하나이다."}, {"term": "HARD Skill / SOFT Skill", "explanation": "HARD Skill은 빅데이터에 대한 이론적 지식과 분석 기술 숙련을, SOFT Skill은 설득력 있는 전달·협력·스토리텔링·시각화 등 커뮤니케이션 능력을 가리킨다."}, {"term": "KDD(Knowledge Discovery in Databases)", "explanation": "데이터베이스에서 지식을 발견하는 과정으로, 데이터 사이언스가 융합하는 지식 분야 중 하나이다."}, {"term": "할 베리언(Hal Varian)", "explanation": "구글 수석 경제학자로, 데이터를 이해·처리·시각화·전달하고 가치를 뽑아내는 능력이 앞으로 10년간 매우 중요해질 것이라고 말했다."}, {"term": "다변량 분석(Multivariate Analysis)", "explanation": "여러 변수를 동시에 다루는 분석 기법으로, 데이터 사이언티스트가 갖춰야 할 8가지 핵심 기술 중 하나이다."}], "quiz": [{"question": "데이터 사이언스를 구성하는 3대 핵심 역량의 융합에 해당하지 않는 것은?", "options": ["통계학", "컴퓨터 과학", "응용 수학", "도메인(전문) 지식"], "answer": 2, "explanation": "본문에 따르면 데이터 사이언스의 3대 핵심 역량은 통계학, 컴퓨터 과학, 도메인 전문 지식이며, 이들이 융합되어 인사이트를 추출하고 의사결정을 최적화한다. 따라서 A(통계학), B(컴퓨터 과학), D(도메인 전문 지식)는 모두 3대 핵심 역량에 해당한다. C(응용 수학)는 본문에서 데이터를 수집·생성하는 데 활용되는 기술로 언급되기는 하지만, '3대 핵심 역량의 융합'으로 명시된 통계학·컴퓨터 과학·도메인 지식에는 포함되지 않으므로 정답이다."}, {"question": "본문에서 데이터의 폭발적 증가를 설명하는 수치로 옳은 것은?", "options": ["지금까지 생성된 데이터의 50%가 최근 5년 안에 만들어졌다", "지금까지 생성된 데이터의 90%가 최근 2년 안에 만들어졌다", "지금까지 생성된 데이터의 30%가 최근 1년 안에 만들어졌다", "지금까지 생성된 데이터의 70%가 최근 10년 안에 만들어졌다"], "answer": 1, "explanation": "본문은 디지털화와 센서로 데이터가 폭발적으로 증가하여 지금까지 생성된 데이터의 90%가 최근 2년 안에 만들어졌다고 설명한다. 전 세계 데이터의 90%가 지난 2년 동안 생성되었다는 서술과도 일치한다."}, {"question": "데이터 사이언티스트가 지녀야 할 8가지 핵심 기술에 포함되지 않는 것은?", "options": ["기본 통계", "다변량 분석", "신호 처리", "소프트웨어 공학"], "answer": 2, "explanation": "데이터 사이언티스트의 8가지 핵심 기술은 기본 도구(R, SQL), 기본 통계, 기계 학습, 다변량 분석, 커뮤니케이션, 시각화, 데이터 멍징(데이터 전처리), 소프트웨어 공학이다. 따라서 A(기본 통계), B(다변량 분석), D(소프트웨어 공학)는 모두 8가지 핵심 기술에 포함된다. C(신호 처리)는 본문에서 데이터 사이언스의 '주요 기술'(확률 모형, 통계적 학습, 기계 학습, 시각화, 데이터 공학, 신호 처리, 패턴 인식, 인공지능, 데이터 마이닝)로 언급될 뿐, 데이터 사이언티스트가 갖춰야 할 8가지 핵심 기술 목록에는 들어 있지 않으므로 정답이다."}, {"question": "데이터 사이언티스트라는 직업에 대한 본문의 평가로 옳은 것은?", "options": ["맥킨지가 2012년 최고 신규 직종으로, 하버드 비즈니스 리뷰가 '가장 매력적인' 21세기의 직종으로 선정했다", "CNN이 2012년 최고 신규 직종으로, 하버드 비즈니스 리뷰가 '가장 매력적인' 21세기의 직종으로 선정했다", "인포월드가 21세기 가장 매력적인 직종으로, CNN이 각광받는 IT 직업 6가지 중 하나로 선정했다", "하버드 비즈니스 리뷰가 2012년 최고 신규 직종으로, EMC가 21세기 가장 매력적인 직종으로 선정했다"], "answer": 1, "explanation": "본문에 따르면 CNN은 2012년 데이터 사이언티스트를 최고 신규 직종으로 선정했고, 하버드 비즈니스 리뷰는 '가장 매력적인' 21세기의 직종으로 선정했으므로 B가 정답이다. A는 2012년 최고 신규 직종 선정 주체를 맥킨지로 바꿔 틀렸다(맥킨지는 2018년까지 14만~19만 명의 데이터 전문가 추가 수요를 전망한 보고서의 주체이다). C는 '21세기 가장 매력적인 직종'을 인포월드로, 'IT 직업 6가지' 선정 주체를 CNN으로 뒤바꿔 틀렸다(매력적인 직종은 하버드 비즈니스 리뷰, IT 직업 6가지는 인포월드이다). D는 두 선정 주체(최고 신규 직종=CNN, 매력적인 직종=하버드 비즈니스 리뷰)를 모두 비틀어 틀렸으며, EMC는 '스킬·훈련 부족'을 인재 부족 요인으로 꼽은 조사의 주체이다."}, {"question": "본문에서 인용한 데이터 사이언티스트의 역량 특징으로 가장 적절한 것은?", "options": ["8가지 핵심 기술 중 기본 통계와 기계 학습만 갖추면 되고, 소프트웨어 공학과 데이터 멍징은 요구되지 않는다", "소프트웨어 공학자보다 통계학에 능하고, 통계학자보다 소프트웨어 공학에 유능해야 한다", "구글 수석 경제학자 할 베리언처럼 도메인 지식만 깊으면 통계·프로그래밍 역량은 불필요하다", "이론적 지식(HARD Skill)만 충분하면 커뮤니케이션 같은 SOFT Skill은 갖추지 않아도 된다"], "answer": 1, "explanation": "정답은 B다. 본문은 데이터 사이언티스트가 소프트웨어 공학자보다 통계학에 능하고, 통계학자보다 소프트웨어 공학에 유능해야 한다고 강조하며, 두 분야를 모두 아우르는 융합적 역량을 핵심으로 본다. A는 틀렸다. 본문이 제시한 8가지 핵심 기술은 기본 도구(R, SQL), 기본 통계, 기계 학습, 다변량 분석, 커뮤니케이션, 시각화, 데이터 멍징, 소프트웨어 공학으로, 일부만 갖추면 된다고 한 적이 없고 소프트웨어 공학과 데이터 멍징도 포함된다. C는 틀렸다. 할 베리언은 데이터를 이해·처리·시각화·전달하고 가치를 뽑아내는 능력의 중요성을 말했을 뿐 도메인 지식만으로 충분하다고 하지 않았으며, 본문은 통계·프로그래밍을 포함한 융합 역량을 요구한다. D는 틀렸다. 본문은 HARD Skill(이론적 지식)과 더불어 SOFT Skill(설득력 있는 전달·협력·스토리텔링·시각화)이 필수적이라고 명시한다."}], "fill": [{"question": "데이터 사이언스는 통계학, 컴퓨터 과학, ____ 전문 지식을 융합하여 빅데이터에서 가치를 추출하는 학문이다.", "answer": "도메인", "accept": ["도메인(전문) 지식", "domain", "도메인 지식"], "explanation": "본문은 데이터 사이언스를 통계학, 컴퓨터 과학, 도메인 전문 지식의 융합으로 정의한다."}, {"question": "본문에 따르면 디지털화와 센서로 데이터가 폭발적으로 증가하여, 지금까지 생성된 데이터의 ____%가 최근 2년 안에 만들어졌다.", "answer": "90", "accept": ["90%", "구십"], "explanation": "본문은 지금까지 생성된 데이터의 90%가 최근 2년 안에 만들어졌다고 설명한다."}, {"question": "구글 수석 경제학자 ____ 은 데이터를 이해·처리·시각화·전달하고 가치를 뽑아내는 능력이 앞으로 10년간 매우 중요해질 것이라고 말했다.", "answer": "할 베리언", "accept": ["Hal Varian", "할베리언", "할 베리언(Hal Varian)"], "explanation": "본문은 구글 수석 경제학자 할 베리언(Hal Varian)의 발언을 인용하고 있다."}, {"question": "분석에 앞서 데이터를 정리·가공하는 데이터 전처리 작업을 ____ 이라 하며, 이는 데이터 사이언티스트의 8가지 핵심 기술 중 하나이다.", "answer": "데이터 멍징", "accept": ["Data Munging", "데이터멍징", "데이터 멍징(Data Munging)", "데이터 전처리"], "explanation": "본문은 데이터 멍징(Data Munging)을 데이터 전처리 작업으로 정의하며 8가지 핵심 기술 중 하나로 제시한다."}]}, {"id": "ch4", "number": 4, "title": "빅데이터 처리/분석 기법 및 활용 사례", "summary": [{"heading": "빅데이터 처리 기법의 이해 - 통찰력과 가치", "points": ["통찰력(Insight)은 사물이나 현상을 꿰뚫어 살펴 감추어진 핵심 내용을 직관적으로 파악하는 능력으로, 빅데이터 시대에는 새로운 통찰력이 빅데이터 전문가의 중요한 역량이다.", "빅데이터는 사회적 문제 해결의 엔진이자 신산업·신성장을 견인하는 기반이며, ICT·IT·4차 산업혁명 시대의 새로운 혁신과 미래 가치를 창출한다.", "빅데이터의 역할과 가치는 현실 세계의 패턴 분석, 미래 전망, 리스크 대응력, 스마트 경쟁력, 융합 창조력 등을 통해 발현된다.", "빅데이터 플랫폼은 윈도우·리눅스 등 컴퓨터 아키텍처, 운영체제, 프로그래밍 언어, GUI를 포함하는 컴퓨팅 플랫폼을 기반으로 하며, 오픈 소스(open source) 기반으로 저렴한 소프트웨어 비용과 글로벌 개발자 커뮤니티를 형성한다.", "빅데이터 처리 플랫폼은 소셜 미디어·센서·금융/보험·공공/기업·과학/제조 등 다양한 소스에서 데이터를 수집하고, 저장 관리·분산 고성능 컴퓨팅·인메모리 컴퓨팅 인프라로 처리하며, 빅데이터 분석·가시화·BI(Business Intelligence) 등의 서비스로 활용한다."]}, {"heading": "하둡(HADOOP) - 처리 핵심 기술", "points": ["하둡은 더그 커팅(Doug Cutting)이 2005년 마이크 카파렐라(Mike Cafarella)와 함께 개발한 대규모 데이터의 병렬/분산 처리를 위한 핵심 기술이다.", "하둡은 분산 파일 시스템인 HDFS(Hadoop Distributed File System)와 분산 처리 시스템인 MapReduce로 구성된다.", "HDFS는 한 대의 컴퓨터에 저장할 수 없는 빅데이터를 여러 대의 컴퓨터에 분산 저장하는 기술이고, MapReduce는 빅데이터 수집/저장/필터링(처리)에 사용되는 병렬/분산 처리 기술이다.", "성능 사례로 야후는 5만 개의 노드로 하둡 네트워크를 구성하여 100TB 데이터를 173분 만에 정렬했으며, 이는 클라우드 컴퓨팅의 역사를 바꾼 기술로 평가된다.", "HDFS와 MapReduce는 모두 Master/Slave 구조를 가지며, HDFS는 Master가 Name node·Slave가 Data node, MapReduce는 Master가 JobTracker·Slave가 TaskTracker이다."]}, {"heading": "HDFS와 Map/Reduce 프로그래밍 모듈", "points": ["Name node는 파일의 메타(meta) 정보를 관리하는 Master 역할을 하고, Data node는 실제 데이터를 여러 대에 분산 저장한다.", "데이터는 일정 크기(기본 64MB)의 블록 단위로 나뉘어 여러 Data node에 분산 및 복제 저장되며, 일부 Data node 장애 시에도 읽고 쓰기에 문제가 없도록 하기 위함이다(사용자에게는 하나의 파일로 보임).", "HDFS는 2003년 Google이 Google File System 논문을 발표하며 창안되었고, MapReduce는 2004년 Google이 논문을 발표했다.", "Map/Reduce는 HDFS에 분산 저장된 파일을 여러 TaskTracker에서 병렬 처리하여 대용량 데이터를 빠르게 처리하며, 병렬화(Parallelization)·분산(Distribution)·내결함성(Fault-Tolerance)을 지원한다.", "JobTracker는 TaskTracker의 상태와 전체 작업 진행 상황을 감시하고 일시적 장애를 자동 복구하며, 작업 할당과 결과 통합을 담당하므로 사용자는 데이터 처리 논리에만 집중할 수 있다."]}, {"heading": "하둡의 적합성·응용 분야와 에코시스템", "points": ["하둡은 모바일 기기 폭증으로 인한 대용량 로그 저장에 적합하고, I/O·CPU 집중 작업을 멀티 노드로 부하 분산하며, 장비 증가 시 성능이 선형에 가깝게 향상된다.", "비용 효율성 측면에서 데이터베이스(RDBMS)는 소프트웨어·하드웨어가 비싸지만 아파치 하둡은 무료이며 Intel Core machine과 Linux는 저렴하여, 데이터 증가 대응에 하둡이 더 적합하다.", "하둡 응용 분야는 ETL(Extract, Transform, Load), 데이터 웨어하우스 저장, 로그 집계, 분산 데이터 저장, 스팸 필터링, 생물 정보학, 이미지/동영상 처리, 기계 학습, 검색 엔진 등이다.", "하둡 에코시스템(Ecosystem)은 HDFS와 맵리듀스를 편리하게 사용하기 위한 유틸리티를 패키지화한 오픈 소스 소프트웨어 총칭으로, Nutch·Cascading·Mahout·Flume·JAQL·HUE·HBASE·Hive·Pig·Zookeeper 등이 있다.", "빅데이터를 주도하는 주요 기업으로 Google, Facebook, Twitter, Microsoft, IBM, Cloudera, Yahoo!, Hortonworks 등이 있다."]}, {"heading": "빅데이터 분석 기법의 이해", "points": ["데이터 분석(Data Analysis)은 데이터 속 보이지 않는 특징을 발견하고 숨은 정보를 파악하는 것으로, 합리적 의사 결정을 위한 결과 도출과 설명적 지식(과학)을 제공하며 일반적으로 통계적 데이터 분석을 의미한다.", "통계 분석(Statistical Analysis)은 사회 현상 자료를 수량적으로 파악·정리하여 통계적으로 실태를 밝히는 일로, 빈도·교차·회귀·군집·분류·요인 분석 등 다양한 기법이 있고 도구로 SPSS·SAS·R이 활용된다.", "빅데이터 분석(Big Data Analysis)은 빅데이터를 다룰 수 있는 프로그램에 의존해 분석하는 것으로, 프로그래밍 언어 R 활용이 중요하며 한국데이터진흥원·미래창조과학부가 제공하는 국가 공인 빅데이터 분석 전문가 자격증이 있다.", "빅데이터 분석 종류에는 텍스트 마이닝, 데이터 마이닝, 평판 분석, 소셜 네트워크 분석, 군집 분석, 연관성 분석, 분류 분석, 예측 분석, 감성 분석, 인공지능/기계 학습/신경망 분석, R 프로그래밍, 시각화 기술 등이 있다.", "텍스트 마이닝(Text Mining)은 자연어 처리 기술 기반으로 비정형 텍스트에서 의미 있는 정보를 추출하고 카테고리를 찾는 기술로, 문서 분류·클러스터링·정보 추출·요약에 사용된다."]}, {"heading": "주요 분석 기법별 정의와 사례", "points": ["워드 클라우드(Word Cloud, 태그 클라우드)는 메타 데이터의 태그를 중요도·인기도에 따라 시각적으로 배치하는 것으로, 알파벳/가나다순 배치에 색상·굵기 변화로 핵심 키워드를 강조한다.", "평판 분석(Opinion Mining)은 소셜 미디어 등 소비자 의견을 수집·분석해 긍정/부정/중립 평판을 추출하는 기술이며, 소셜 네트워크 분석(SNA)은 그래프 이론에 따라 연결 구조·강도로 개인·그룹의 영향력과 행동 패턴을 측정한다(그루폰 등 활용).", "군집 분석(Cluster Analysis)은 데이터 간 유사도(상관 계수·유클리드 거리)에 따라 합쳐가는 방법으로 계층적 기법과 비계층적(K 평균 군집법) 기법이 있고, 연관성 분석(Association Analysis)은 항목 간 연관 규칙을 발견하는 '장바구니 분석'으로 맥주와 기저귀 연관성이 대표 사례다.", "분류 분석(Classification Analysis)은 사전 학습 데이터(training set)로 범주 특성을 알 때 새 객체를 정해진 범주로 분류하는 것으로 기계 학습의 감독 학습(supervised learning)에 해당하며, 의사 결정 나무·신경망·서포트 벡터 기계 등을 사용한다.", "예측 분석(Prediction Analysis)은 패턴을 활용해 확률·결과를 예측하는 것으로 예측 추론(회귀·로지스틱 회귀)과 시계열 예측(forecasting, 자기 회귀 이동 평균)으로 구분되고, 감성 분석(Sentiment Analysis)은 텍스트에서 작성자의 감정을 추출하는 텍스트 마이닝의 한 영역이다.", "시각화 분석(Visualization)은 방대한 자료를 도표·차트로 정리해 한눈에 보게 하는 것으로, 정보 습득 시간 절감과 즉각적 상황 판단, 기억 도움, 흥미 유발 및 정보의 빠른 확산을 촉진한다(열 지도 재난 위험도 시각화 등)."]}, {"heading": "빅데이터 활용 사례", "points": ["구글 독감 경보 예측 시스템은 집계된 Google 검색 데이터로 전 세계 독감 유행을 거의 실시간 예측하며, 18개 국가를 대상으로 매일 업데이트하고 2003~2008년 상위 5천만 개 검색어 중 독감 지역 상위 검색어 빈도수로 예측 모형을 구성했다.", "치안·범죄 예방은 미국 Santa Cruz가 2011년부터 과거 범죄 패턴 분석으로 차량 도난·주거 침입을 예측했고, 8년간 범죄 데이터 분석으로 '핫 스팟(hot spot)'을 추출해 71% 정확도의 범죄 예측 시스템을 운영한다.", "FBI 유전자 색인 시스템은 1시간 내 범인 DNA 분석을 위한 실시간 빅데이터 솔루션으로, 2007년 4만 5천 5백 건의 범인 DNA를 적중시켰다.", "탈세 방지 시스템은 납세 관련 정부·소셜 데이터를 종합 분석해 연간 3천 4백 5십억 달러의 탈세 수입을 방지하며 국가 재정 강화에 기여한다.", "의료 분야에서는 국립 보건원과 75개 기업·기관이 '1000 유전체 프로젝트'를 수행해 난치병 치료·신약 개발에 기여하고, 의약품 정보 서비스 'Pillbox'로 주요 질병 분포 통계를 확보한다.", "오바마 선거 전략(2012년 미국 대통령 선거)은 100명 이상의 데이터 과학자를 고용해 페이스북 자료와 1억 9천만 명의 유권자 데이터베이스를 매치한 '승리의 과학'으로, 빅데이터 활용 선거 전략 성공 사례로 평가된다."]}], "keywords": [{"term": "하둡(HADOOP)", "explanation": "더그 커팅이 2005년 개발한 대규모 데이터의 병렬/분산 처리 핵심 기술로, HDFS와 MapReduce로 구성되며 클라우드 컴퓨팅의 역사를 바꾼 기술로 평가된다."}, {"term": "HDFS(Hadoop Distributed File System)", "explanation": "한 대에 저장할 수 없는 빅데이터를 여러 컴퓨터에 기본 64MB 블록 단위로 분산·복제 저장하는 분산 파일 시스템으로, 2003년 Google File System 논문에서 창안되었다."}, {"term": "MapReduce", "explanation": "HDFS에 분산 저장된 파일을 여러 TaskTracker에서 병렬 처리하는 분산 처리 모델로, 병렬화·분산·내결함성을 지원하며 2004년 Google이 논문을 발표했다."}, {"term": "하둡 에코시스템(Ecosystem)", "explanation": "HDFS와 맵리듀스를 편리하게 사용하기 위한 유틸리티를 패키지화한 오픈 소스 소프트웨어 총칭으로, Hive·Pig·HBASE·Mahout·Zookeeper 등이 포함된다."}, {"term": "텍스트 마이닝(Text Mining)", "explanation": "자연어 처리 기술 기반으로 비정형 텍스트에서 의미 있는 정보를 추출하고 카테고리를 찾는 기술로, 문서 분류·클러스터링·정보 추출·요약에 활용된다."}, {"term": "평판 분석(Opinion Mining)", "explanation": "소셜 미디어 등 소비자 의견을 수집·분석해 제품·서비스에 대한 긍정/부정/중립 평판을 추출하는 기술로, 텍스트 마이닝·자연어 처리·형태소 분석 등을 활용한다."}, {"term": "군집 분석(Cluster Analysis)", "explanation": "데이터 간 유사도(상관 계수·유클리드 거리)에 따라 가까운 것부터 합쳐가는 분석으로, 계층적 기법과 비계층적(K 평균 군집법) 기법으로 나뉜다."}, {"term": "연관성 분석(Association Analysis)", "explanation": "데이터 항목 간 연관 규칙(Association Rule)을 발견하는 분석으로 '장바구니 분석(Market Basket Analysis)'이라고도 하며, 맥주와 기저귀의 연관성이 대표 사례다."}, {"term": "분류 분석(Classification Analysis)", "explanation": "사전 학습 데이터로 범주 특성을 알 때 새 객체를 정해진 범주로 분류하는 것으로, 기계 학습의 감독 학습(supervised learning)에 해당한다."}, {"term": "구글 독감 경보 예측 시스템(Google Flu Trends)", "explanation": "집계된 Google 검색 데이터로 전 세계 독감 유행 수준을 거의 실시간 예측하는 시스템으로, 18개 국가를 대상으로 매일 업데이트한다."}], "quiz": [{"question": "하둡(HADOOP)의 구성 요소에 대한 설명으로 옳은 것은?", "options": ["분산 파일 시스템 HDFS와 분산 처리 시스템 MapReduce로 구성된다.", "분산 파일 시스템 MapReduce와 분산 처리 시스템 HDFS로 구성된다.", "인메모리 컴퓨팅 시스템 HDFS와 GUI 시스템 MapReduce로 구성된다.", "관계형 데이터베이스 RDBMS와 데이터 웨어하우스로 구성된다."], "answer": 0, "explanation": "하둡은 분산 파일 시스템인 HDFS(Hadoop Distributed File System)와 분산 처리 시스템인 MapReduce로 구성된다. HDFS가 분산 저장을, MapReduce가 병렬/분산 처리를 담당하는 점이 핵심이다."}, {"question": "HDFS의 데이터 저장 방식에 대한 설명으로 옳지 않은 것은?", "options": ["Name node는 파일의 메타(meta) 정보를 관리하는 Master 역할을 한다.", "데이터는 기본 64MB 블록 단위로 나뉘어 여러 Data node에 분산·복제 저장된다.", "일부 Data node에 장애가 발생해도 읽고 쓰기에 문제가 없도록 설계되었다.", "사용자에게는 데이터가 여러 조각으로 나뉘어 별도 파일들로 보인다."], "answer": 3, "explanation": "HDFS는 실제로는 데이터가 블록 단위로 여러 Data node에 분산·복제 저장되지만, 사용자에게는 하나의 파일로 보인다. 따라서 '별도 파일들로 보인다'는 설명이 틀렸다."}, {"question": "마케팅에서 '장바구니 분석(Market Basket Analysis)'이라고도 불리며, 맥주와 기저귀의 연관성 사례로 유명한 분석 기법은?", "options": ["군집 분석(Cluster Analysis)", "연관성 분석(Association Analysis)", "감성 분석(Sentiment Analysis)", "분류 분석(Classification Analysis)"], "answer": 1, "explanation": "데이터 항목 간 연관 규칙을 발견하는 연관성 분석은 손님의 장바구니 품목 간 관계를 본다는 의미에서 '장바구니 분석'으로 불리며, 맥주와 기저귀의 연관성이 대표적 사례다."}, {"question": "구글 독감 경보 예측 시스템(Google Flu Trends)에 대한 설명으로 옳은 것은?", "options": ["대부분의 보건 기구처럼 일주일에 한 번 예상 수치를 업데이트한다.", "정부 당국이 수집한 병원 진료 기록만을 기반으로 예측한다.", "집계된 Google 검색 데이터로 18개 국가를 대상으로 매일 업데이트하며 독감 유행을 예측한다.", "2009년 이후 데이터 부족으로 미국 외 국가로는 확대되지 못했다."], "answer": 2, "explanation": "구글 독감 트렌드는 집계된 검색 데이터를 사용해 18개 국가를 대상으로 매일 업데이트하며 거의 실시간으로 독감 유행을 예측한다. 일주일에 한 번 업데이트하는 것은 대부분의 보건 기구이며, 구글 예측은 세계 많은 나라로 확대되었다."}, {"question": "분류 분석(Classification Analysis)에 대한 설명으로 옳은 것은?", "options": ["정답(범주)이 없는 데이터를 유사도에 따라 자동으로 묶는 비지도 학습 기법이다.", "사전 학습 데이터(training set)로 범주 특성을 알 때 새 객체를 정해진 범주로 분류하는 감독 학습이다.", "텍스트에서 작성자의 감정을 긍정/부정으로 추출하는 텍스트 마이닝 기법이다.", "시간과 관련된 시계열 데이터로 미래 값을 예측하는 기법이다."], "answer": 1, "explanation": "분류 분석은 사전에 주어진 학습 데이터로 각 범주의 특성을 알고 있을 때 새 객체를 정해진 범주로 분류하는 것으로, 기계 학습의 감독 학습(supervised learning)에 해당한다. A는 군집 분석, C는 감성 분석, D는 시계열 예측에 대한 설명이다."}], "fill": [{"question": "하둡(HADOOP)은 더그 커팅이 ____년에 마이크 카파렐라와 함께 개발한 대규모 데이터의 병렬/분산 처리를 위한 핵심 기술이다.", "answer": "2005", "accept": ["2005년"], "explanation": "하둡은 더그 커팅(Doug Cutting)이 2005년 마이크 카파렐라와 함께 개발한 병렬/분산 처리 핵심 기술이다."}, {"question": "하둡은 분산 파일 시스템인 HDFS와 분산 처리 시스템인 ____로 구성된다.", "answer": "MapReduce", "accept": ["맵리듀스", "Map/Reduce"], "explanation": "하둡은 분산 저장을 담당하는 HDFS와 병렬/분산 처리를 담당하는 MapReduce로 구성된다."}, {"question": "HDFS에서 데이터는 기본 ____MB 크기의 블록 단위로 나뉘어 여러 Data node에 분산 및 복제 저장된다.", "answer": "64", "accept": ["64MB", "64메가바이트"], "explanation": "HDFS는 데이터를 기본 64MB 블록 단위로 나누어 여러 Data node에 분산·복제 저장한다."}, {"question": "데이터 항목 간 연관 규칙을 발견하는 ____ 분석은 '장바구니 분석'이라고도 하며, 맥주와 기저귀의 연관성이 대표 사례다.", "answer": "연관성", "accept": ["연관성 분석", "Association Analysis", "연관"], "explanation": "연관성 분석(Association Analysis)은 항목 간 연관 규칙을 발견하는 기법으로 '장바구니 분석'으로 불리며 맥주와 기저귀 연관성이 대표 사례다."}]}, {"id": "ch5", "number": 5, "title": "인공지능 기술 I: 개념·역사·전문가 시스템", "summary": [{"heading": "인공지능의 기본 개념과 지능의 정의", "points": ["인공지능(Artificial Intelligence, AI)은 학습이나 문제 해결 같은 지능적 기능을 가지는 기계나 컴퓨터를 의미하며, 인간의 지능과 비교되는 관점에서 기계가 보여주는 지능이다.", "콜린스 사전은 지능을 '무엇인가를 이해하고 배우는 능력, 생각하고 이해하는 능력'으로 정의한다.", "생각(thinking)은 문제를 고려하거나 아이디어를 만들기 위해 두뇌를 사용하는 행위이다.", "강인공지능(Strong AI)은 인간의 개입 없이 문제를 해결하고 자의식이 있는 인공지능으로, 터미네이터의 스카이넷, 아이언맨의 자비스, 영화 AI의 데이빗이 예시이다.", "약인공지능(Weak AI)은 특정 영역의 주어진 문제만 해결할 수 있고 자의식이 없으며, 딥마인드의 알파고와 CCTV의 안면 인식 시스템이 예시이다."]}, {"heading": "튜링 모방 게임(튜링 테스트)", "points": ["1950년 초 앨런 튜링이 인공지능 여부를 판정하는 방법으로 고안했다.", "목표는 기계(컴퓨터)가 지능을 측정하는 행동 테스트를 통과할 수 있는지를 확인하는 것이다.", "판정 기준은 인간의 질문에 대한 답변을 보고 답변자가 인간인지 기계인지 구별하지 못하면 기계가 테스트를 통과한 것으로 간주하는 것이다.", "1단계에서는 평가자 맞은편 두 방에 남자와 여자를 배치하고 키보드와 모니터로만 소통하며, 남자는 여자인 것처럼 가장하고 여자는 자신이 여자임을 확신시킨다.", "2단계에서는 남자를 프로그래밍된 컴퓨터로 교체하고, 컴퓨터가 평가자를 속일 수 있다면 테스트를 통과한 것으로 판정한다.", "이 테스트는 지능에 대한 객관적인 시각을 제공하며, 실험의 형식과는 관계가 없다는 특징이 있다."]}, {"heading": "인공지능의 역사", "points": ["탄생(1950년대): 1943년 맥클록과 워렌 피츠가 인공지능의 첫 번째 '뇌의 뉴런 모델' 논문을 발표했고, 1950년 클라우드 섀넌이 체스 게임이 10^120에 해당하는 이동 횟수를 포함한다고 지적했으며, 1956년 존 맥카시가 다트머스 대학교에서 여름 워크숍을 개최했다.", "융성(1956년~1960년대): 표현, 알고리즘, 지식 학습, 신경 컴퓨팅, 단어 계산 분야에서 중요한 아이디어가 탄생했고 인공지능이 모든 문제를 해결할 수 있는 것처럼 인식되었다.", "현실 직면: 대부분의 프로젝트는 간단한 장난감 문제만 해결하는 수준에 머물러 어려운 실세계 문제를 다루지 못했고, 실적 부진으로 지원이 중단되었다.", "전문가 시스템의 개발(1970년대): 전문 지식이 필요한 영역으로 문제를 제한하여 DENDRAL, MYCIN, PROSPECTOR 같은 전문가 시스템이 개발되었고, 인공지능 기술이 연구소에서 상업적 환경으로 성공적으로 전이되었다.", "신경망의 재탄생(1980년대 중반): 학습 신경망과 역전파 알고리즘이 개발되었고, 컴퓨터 기술 발전과 함께 더 크고 복잡한 신경망을 훈련하는 딥러닝으로 발전하여 이미지·음성 인식에서 우수한 성능을 보였다.", "진화 연산: 유전 알고리즘, 진화 전략, 유전 프로그래밍 등이 개발되어 고도로 복잡한 비선형 탐색·최적화 문제에 해를 제시하며, 유전 프로그래밍은 구체적으로 프로그래밍하지 않고도 문제 해결이 가능하다.", "지식 공학의 시대: 신경망을 보완하기 위해 퍼지 논리 기술이 개발되었으며, 퍼지 논리는 모호하고 불확실한 지식·데이터를 다룰 수 있어 식기세척기, 에어컨, 텔레비전, 세탁기, 복사기, 자동차 등에 적용되었다."]}, {"heading": "규칙 기반 전문가 시스템: 지식 표현과 생성 규칙", "points": ["지식은 어떤 주제나 분야에 대해 이론적으로 이해하거나 실제로 할 수 있는 것을 의미하며, 전문가는 특정 분야의 해박한 지식(사실과 규칙)과 풍부한 경험을 쌓은 사람이다.", "인간의 정신 작용은 내면적이고 알고리즘으로 표현하기에 너무 복잡하지만, 대부분의 전문가는 문제 풀이 지식을 규칙 형태로 표현하는 데 능숙하다.", "생성 규칙은 IF-THEN 형식으로 표현하며, IF 부분은 전건(antecedent, 전제·조건), THEN 부분은 후건(consequent, 결론·행동)으로 구성된다.", "조건은 AND·OR 등으로 조합할 수 있고 결론은 여러 개를 가질 수 있으며, 조건부와 결론부는 객체와 값으로 구성된다.", "규칙은 사실 사이의 관계 표현, 조언·추천 표현, 특정 행동 지시 표현, 여러 행동의 복합 지시 표현으로 쓰일 수 있다.", "휴리스틱 표현은 시간이나 정보가 부족할 때 즉흥적이거나 직관적으로 어림짐작하는 기술을 규칙으로 나타낸 것이다."]}, {"heading": "전문가 시스템의 특징·구성·동작 방식", "points": ["전문가 시스템은 빠른 문제 해결 속도와 휴리스틱 적용을 통한 고품질 성능, 결론 도달 과정을 설명하는 해설 능력(Explanation Capability), 질적 데이터를 다루는 심벌 추론(Symbolic Reasoning)을 사용하며, 실수할 수도 있다.", "전문가 시스템 틀은 지식을 추가하지 않은 비어 있는 시스템으로, 규칙과 데이터를 입력해 새 전문가 시스템을 만들 수 있다.", "개발팀은 주제 전문가(가장 중요한 사람), 지식 공학자, 프로그래머(LISP·Prolog·OPS5 등 AI 언어와 C·Pascal·Java 사용), 프로젝트 관리자, 최종 사용자로 구성된다.", "규칙 기반 전문가 시스템의 기본 구조는 기반 지식, 데이터베이스, 추론 엔진, 해설 설비, 사용자 인터페이스로 이루어진다.", "추론 엔진은 각 규칙을 데이터베이스의 사실과 비교하여 IF 부분이 일치하면 규칙이 점화되고 THEN 부분을 수행하는 일치-점화 사이클로 동작한다.", "순방향 연결(데이터 지향 추론)은 알려진 사실에서 추론을 시작해 더 점화할 규칙이 없으면 중단하고, 역방향 연결(목표 지향 추론)은 목표를 정하고 이를 증명할 증거 찾기를 시도하며, 선택은 주제 전문가가 문제를 푸는 방식에 달려 있다.", "장점은 자연스러운 지식 표현·통일된 구조·지식과 처리 과정의 분리·불완전하고 불확실한 지식 추론이며, 단점은 규칙 간 불분명한 관계·전체 전략 기여 관찰의 어려움·비효율적 탐색·지속적 수정 유지 필요이다."]}, {"heading": "확률적 전문가 시스템과 불확실성 처리", "points": ["전문가 시스템은 불완전하거나 일관성이 없거나 불확실한 정보를 처리해야 하며, 전문가처럼 불확실성을 다뤄 유효한 결론을 도출할 수 있어야 한다.", "불확실한 지식이 필요한 이유는 상관관계가 취약한 함축(수치화된 확신도로 해결), 부정확한 언어(자연어의 모호성), 알려지지 않은 데이터(근사적 추론), 여러 전문가 관점 통합(모순된 견해·충돌 규칙) 때문이다.", "베이즈 추론은 사건 E가 발생했을 때 사건 H가 발생할 확률이 p임을 의미하며, H는 가설, E는 가설을 지지하는 증거이다.", "확신도(cf)는 증거 E가 발생했을 때 가설 H에 대한 신뢰를 나타내며, 신뢰의 정도와 불신의 정도를 나타내는 두 함수에 기초한다.", "불확실성 처리 방법의 공통점은 개인적·주관적이며 질 좋은 정보의 양을 잴 수 있는 전문가가 필요하다는 것이다.", "베이즈 방법은 신뢰성 있는 통계 데이터와 지식 공학자가 있고 전문가와 분석적·진지한 대화를 할 수 있는 경우에 적합하며, 확신도 기법은 이론적 기반이 부족하지만 불확실성을 다루는 단순한 접근 방식을 제공한다."]}], "keywords": [{"term": "강인공지능(Strong AI)", "explanation": "인간의 개입 없이 문제를 해결하고 자의식이 있는 인공지능이다. 스카이넷, 자비스, 영화 AI의 데이빗이 예시이다."}, {"term": "약인공지능(Weak AI)", "explanation": "특정 영역의 주어진 문제만 해결할 수 있고 자의식이 없는 인공지능이다. 알파고와 CCTV 안면 인식 시스템이 예시이다."}, {"term": "튜링 테스트(튜링 모방 게임)", "explanation": "1950년 초 앨런 튜링이 고안한 판정 방법으로, 답변을 보고 인간인지 기계인지 구별하지 못하면 기계가 지능 테스트를 통과한 것으로 간주한다."}, {"term": "전문가 시스템(Expert System)", "explanation": "특정 분야의 전문 지식을 규칙으로 표현하여 문제를 해결하는 시스템으로, DENDRAL·MYCIN·PROSPECTOR가 대표 사례이다."}, {"term": "생성 규칙(IF-THEN 규칙)", "explanation": "전건(antecedent, IF 부분)과 후건(consequent, THEN 부분)으로 구성되는 규칙으로, 조건과 결론을 객체와 값으로 표현한다."}, {"term": "추론 엔진(Inference Engine)", "explanation": "기반 지식의 규칙을 데이터베이스의 사실과 비교하여 규칙을 점화하고 새로운 사실을 밝혀내는 추론 담당 구성요소이다."}, {"term": "순방향 연결(데이터 지향 추론)", "explanation": "알려진 사실에서 추론을 시작해 순방향으로 진행하며 더 이상 점화할 규칙이 없을 때 중단하는 추론 방식이다."}, {"term": "역방향 연결(목표 지향 추론)", "explanation": "전문가 시스템이 목표를 먼저 정하고 추론 엔진이 이를 증명하기 위해 증거 찾기를 시도하는 추론 방식이다."}, {"term": "베이즈 추론(Bayesian Reasoning)", "explanation": "증거 E가 발생했을 때 가설 H가 발생할 확률 p를 다루는 방법으로, 신뢰성 있는 통계 데이터가 있을 때 적합하다."}, {"term": "확신도(Certainty Factor, cf)", "explanation": "증거 E가 주어졌을 때 가설 H에 대한 신뢰를 나타내는 값으로, 신뢰의 정도와 불신의 정도를 나타내는 두 함수에 기초한다."}], "quiz": [{"question": "다음 중 약인공지능(Weak AI)의 예로 가장 적절한 것은?", "options": ["터미네이터의 스카이넷", "아이언맨의 자비스", "딥마인드의 알파고", "영화 AI의 데이빗"], "answer": 2, "explanation": "약인공지능은 특정 영역의 문제만 해결하고 자의식이 없는 인공지능으로, 알파고와 CCTV 안면 인식 시스템이 예시이다. 스카이넷·자비스·데이빗은 자의식이 있는 강인공지능(Strong AI)의 예이다."}, {"question": "튜링 테스트(튜링 모방 게임)에 대한 설명으로 옳지 않은 것은?", "options": ["1950년 초 앨런 튜링이 인공지능 여부 판정 방법으로 고안했다.", "답변자가 인간인지 기계인지 구별하지 못하면 기계가 통과한 것으로 본다.", "2단계에서 남자를 프로그래밍된 컴퓨터로 교체한다.", "테스트는 실험의 형식에 크게 의존하여 형식이 바뀌면 결과가 달라진다."], "answer": 3, "explanation": "튜링 테스트는 지능에 대한 객관적인 시각을 제공하며 실험의 형식과는 관계가 없다는 특징이 있으므로 D가 틀린 설명이다. 나머지는 모두 원문에 부합한다."}, {"question": "인공지능 역사에서 1970년대를 대표하는 흐름으로 옳은 것은?", "options": ["역전파 알고리즘과 딥러닝의 등장", "DENDRAL, MYCIN, PROSPECTOR 등 전문가 시스템의 개발", "다트머스 여름 워크숍 개최", "뇌의 뉴런 모델 논문 최초 발표"], "answer": 1, "explanation": "1970년대는 문제를 전문 지식 영역으로 제한하여 DENDRAL·MYCIN·PROSPECTOR 같은 전문가 시스템이 개발되고 상업적 환경으로 전이된 시기이다. 역전파·딥러닝은 1980년대 중반, 다트머스 워크숍은 1956년, 뉴런 모델 논문은 1943년이다."}, {"question": "규칙 기반 전문가 시스템의 기본 구조 구성요소가 아닌 것은?", "options": ["추론 엔진", "사용자 인터페이스", "확신도 산출기", "기반 지식"], "answer": 2, "explanation": "규칙 기반 전문가 시스템의 기본 구조는 기반 지식, 데이터베이스, 추론 엔진, 해설 설비, 사용자 인터페이스의 다섯 가지로 구성된다. 따라서 A(추론 엔진), B(사용자 인터페이스), D(기반 지식)는 모두 기본 구조 구성요소에 해당한다. 정답은 C로, 확신도(cf)는 불확실한 지식을 처리할 때 증거 E가 주어졌을 때 가설 H에 대한 신뢰를 나타내는 값일 뿐, 기본 구조의 구성요소가 아니다. 확신도는 불확실성 처리 기법에 속하는 개념이어서 그럴듯해 보이지만 구조 구성요소 목록에는 포함되지 않는다."}, {"question": "불확실한 지식 처리 방법에 대한 설명으로 옳은 것은?", "options": ["베이즈 방법은 이론적 기반이 부족하지만 단순한 접근 방식을 제공한다.", "확신도 기법은 신뢰성 있는 통계 데이터가 충분할 때만 사용할 수 있다.", "확신도(cf)는 신뢰의 정도와 불신의 정도를 나타내는 두 함수에 기초한다.", "두 방법 모두 객관적 데이터만으로 충분하며 전문가가 필요 없다."], "answer": 2, "explanation": "확신도(cf)는 증거 E가 주어졌을 때 가설 H에 대한 신뢰를 신뢰의 정도와 불신의 정도를 나타내는 두 함수로 표현한다. 이론적 기반 부족·단순함은 확신도 기법의 특징이고, 통계 데이터가 필요한 것은 베이즈 방법이며, 두 방법 모두 주관적이라 전문가가 필요하다."}], "fill": [{"question": "1950년 초 ____은(는) 인공지능 여부를 판정하는 방법으로, 답변자가 인간인지 기계인지 구별하지 못하면 기계가 지능 테스트를 통과한 것으로 간주하는 모방 게임을 고안했다.", "answer": "앨런 튜링", "accept": ["튜링", "Alan Turing", "Turing"], "explanation": "원문에서 튜링 테스트(튜링 모방 게임)는 1950년 초 앨런 튜링이 인공지능 여부 판정 방법으로 고안했다고 명시되어 있다."}, {"question": "1956년 ____은(는) 다트머스 대학교에서 여름 워크숍을 개최하여 인공지능 연구의 출발점을 마련했다.", "answer": "존 맥카시", "accept": ["맥카시", "John McCarthy", "McCarthy"], "explanation": "인공지능의 역사 중 탄생기 설명에서 1956년 존 맥카시가 다트머스 대학교에서 여름 워크숍을 개최했다고 서술되어 있다."}, {"question": "1970년대 전문가 시스템 개발기에는 전문 지식이 필요한 영역으로 문제를 제한하여 DENDRAL, ____, PROSPECTOR 같은 전문가 시스템이 개발되었다.", "answer": "MYCIN", "accept": ["마이신", "mycin"], "explanation": "전문가 시스템의 개발(1970년대) 항목에서 DENDRAL, MYCIN, PROSPECTOR가 대표 사례로 제시되어 있다."}, {"question": "생성 규칙은 IF-THEN 형식으로 표현되며, IF 부분은 전건(antecedent), THEN 부분은 ____(consequent)으로 구성된다.", "answer": "후건", "accept": ["consequent", "결론"], "explanation": "규칙 기반 전문가 시스템의 지식 표현 설명에서 IF 부분은 전건(antecedent), THEN 부분은 후건(consequent, 결론·행동)으로 구성된다고 명시되어 있다."}]}, {"id": "ch6", "number": 6, "title": "인공지능 기술 II: 퍼지 논리·진화 연산", "summary": [{"heading": "퍼지 논리와 퍼지 집합", "points": ["퍼지 논리(Fuzzy Logic)는 모호한 대상을 다루는 논리로, 퍼지 집합을 통해 모호한 정도를 조절할 수 있는 집합 이론이다.", "빠르기, 거리, 가격, 온도, 밝기 등 경계가 불분명한 척도에 활용할 수 있다.", "불 논리(Boolean Logic)는 참과 거짓이 확실히 구분되지만, 퍼지 논리는 여러 값을 가지는 다치 논리이다.", "예를 들어 시속 101km와 99km의 과속 판단에서 불 논리는 불합리하지만 퍼지 논리는 이를 피할 수 있다.", "1965년 캘리포니아 대학 버클리의 자데가 '퍼지 집합' 논문을 발표하며 시작되었다.", "고전적 집합(크리스프 집합)은 원소가 속하거나 속하지 않는 이분법만 존재하지만, 퍼지 집합은 각 원소가 [0,1] 사이의 소속도를 가진다.", "소속 함수 fA(x)는 원소 x가 집합 A에 속하는 정도를 나타내며, 완전히 속하면 1, 완전히 안 속하면 0, 부분적으로 속하면 0과 1 사이 값을 가진다."]}, {"heading": "언어 변수와 헤지", "points": ["언어 변수(퍼지 변수)는 형용사나 동사 형태의 언어 값을 가질 수 있는 단어 변수이다.", "'존은 크다'에서 '존'이 언어 변수이고 '크다'가 언어 값이다.", "헤지(Hedge)는 '얼마간', '매우', '다소', '꽤', '조금' 등 퍼지 집합의 모양을 바꾸는 한정사이다.", "헤지는 집중 연산, 확장 연산과 같은 연산자 역할을 하며 기존 집합에서 부분적인 퍼지 집합을 생성한다.", "소속 함수를 통해 '약간', '조금', '매우', '몹시', '매우매우', '다소', '얼마간', '확실히' 등의 헤지를 수식·그래프로 표현할 수 있다."]}, {"heading": "퍼지 규칙과 퍼지 전문가 시스템", "points": ["퍼지 규칙(Fuzzy Rules)은 퍼지 집합을 이용한 IF-THEN 형식의 규칙이다.", "고전적 규칙은 'IF 가격 > 1000원 THEN 판매량이 적다'처럼 명확한 경계를 가진다.", "퍼지 규칙은 'IF 가격이 비싸다 THEN 판매량이 적다'처럼 언어 변수에 따라 퍼지 집합의 소속도를 가지며, 고전적 규칙을 통합해 최소 90%를 제거할 수 있다.", "퍼지 전문가 시스템 개발은 5단계로 진행된다.", "1단계는 문제 명확화 및 언어 변수 정의로 가장 중요한 단계이며, 2단계는 퍼지 집합 결정(삼각형·사다리꼴이 적절)이다.", "3단계는 퍼지 규칙 구성·도출, 4단계는 퍼지 집합·규칙·추론을 시스템에 부호화(MATLAB Fuzzy Toolbox 등 활용)하는 단계이다.", "5단계는 시스템 평가 및 조정으로, 최초 요구 사항 만족 여부를 확인하고 입출력 변수와 집합을 재검토·조정한다."]}, {"heading": "진화 연산의 개념", "points": ["진화 연산(Evolutionary Computation)은 컴퓨터에서 진화를 흉내 내는 것으로 최적화 알고리즘의 최종 결과이다.", "기계 학습의 진화론적 방법론은 자연 선택과 유전학 계산 모델에 근거한다.", "유전 알고리즘, 진화 전략, 유전 프로그래밍을 포함한다.", "신다윈주의는 진화를 선택, 변이, 재생산을 이용하여 흉내 낸다.", "적합성은 생존·재생산 능력을 의미하며 직접 측정은 불가능하나 생태학·기능 형태학을 바탕으로 추정 가능하다.", "컴퓨터의 진화 방법은 개체 집단 생성 → 적합도 평가 → 유전 연산자로 새 집단 생성을 여러 번 반복한다."]}, {"heading": "유전 알고리즘", "points": ["유전 알고리즘(Genetic Algorithm)은 존 홀랜드가 창안했으며 교차와 변이를 핵심 연산으로 사용한다.", "염색체는 여러 유전자(gene)로 이루어지고 각 유전자는 0과 1로 인코딩된 문자열로 표현되며, 평가 함수는 문제 성능(적합도)을 잰다.", "룰렛 휠 선택은 적합도 비율에 따라 휠 조각 넓이를 할당하고 난수가 걸친 구간의 염색체를 선택하는 방법이다.", "교차 연산자는 두 부모 염색체의 임의 교차점 뒤쪽 부분을 교환해 자식 2개를 생성하며, 교차율 0.7에서 좋은 결과를 낸다.", "변이 연산자는 유전자 값을 0→1 또는 1→0으로 뒤집어 지역 최적점에 갇히지 않도록 보장하며, 변이율은 0.001~0.01로 낮다."]}, {"heading": "진화 전략과 유전 프로그래밍", "points": ["진화 전략(Evolution Strategy)은 해집단을 구하고 평가하는 단계를 반복하며 집단 전체가 동시에 변화해 새로운 해집단을 생성한다.", "진화 전략은 변이만 사용하고 해를 인코딩된 형태로 나타낼 필요가 없으나, 유전 알고리즘은 교차와 변이를 모두 사용하고 해를 염색체로 인코딩한다.", "유전 프로그래밍(Genetic Programming)은 진화 자연 선택으로 컴퓨터 프로그램을 생성하며, 유전 알고리즘을 확장해 이진 문자열 대신 컴퓨터 프로그램을 유전자로 사용한다.", "준비 단계에서 말단 집합(입력 대응), 함수 집합, 적합도 함수, 실행 제어 인자, 결과 표현 방법을 결정한다.", "프로그램 생성 시 복제율·교차율·변이율을 모두 더하면 1이 되어야 하며, 복제·교차·변이 유전 연산자를 확률대로 적용한다.", "유전 프로그래밍은 유전 알고리즘과 동일한 진화 방법을 쓰지만 이진 문자열이 아닌 완전한 컴퓨터 프로그램을 다루며, 복잡한 대형 문제는 아직 다루기 어렵고 수행 시간이 길다는 단점이 있다."]}], "keywords": [{"term": "퍼지 논리 (Fuzzy Logic)", "explanation": "모호한 대상을 다루는 다치 논리로, 참과 거짓만 구분하는 불 논리와 달리 여러 값을 가질 수 있다. 1965년 자데의 퍼지 집합 논문에서 시작되었다."}, {"term": "퍼지 집합 (Fuzzy Set)", "explanation": "경계가 불분명한 집합으로 각 원소가 [0,1] 사이의 소속도를 가진다. 원소가 속하거나 안 속하는 이분법만 갖는 크리스프 집합과 대비된다."}, {"term": "소속 함수 (fA(x))", "explanation": "원소 x가 집합 A에 속하는 정도를 [0,1] 사이 값으로 표현하는 함수이다. 완전히 속하면 1, 안 속하면 0, 부분적으로 속하면 0과 1 사이 값이다."}, {"term": "언어 변수 (Linguistic Variable)", "explanation": "형용사나 동사 형태의 언어 값을 가질 수 있는 단어 변수이다. 예: '존은 크다'에서 '존'이 언어 변수이다."}, {"term": "헤지 (Hedge)", "explanation": "'매우', '다소', '조금' 등 퍼지 집합의 모양을 바꾸는 한정사이다. 집중·확장 연산자 역할을 하며 부분적인 퍼지 집합을 생성한다."}, {"term": "퍼지 규칙 (Fuzzy Rules)", "explanation": "퍼지 집합을 이용한 IF-THEN 형식의 규칙이다. 고전적 규칙을 통합해 최소 90%를 제거할 수 있다."}, {"term": "진화 연산 (Evolutionary Computation)", "explanation": "컴퓨터에서 진화를 흉내 내는 최적화 방법으로, 자연 선택과 유전학 계산 모델에 근거한다. 유전 알고리즘, 진화 전략, 유전 프로그래밍을 포함한다."}, {"term": "유전 알고리즘 (Genetic Algorithm)", "explanation": "존 홀랜드가 창안한 진화 연산 기법으로 교차와 변이를 사용한다. 0과 1로 인코딩된 염색체를 적합도에 따라 진화시킨다."}, {"term": "진화 전략 (Evolution Strategy)", "explanation": "변이만을 사용하며 해를 인코딩하지 않는 진화 연산 기법이다. 제약 조건 유무를 포함한 광범위한 비선형 최적화 문제를 해결한다."}, {"term": "유전 프로그래밍 (Genetic Programming)", "explanation": "이진 문자열 대신 컴퓨터 프로그램을 유전자로 사용해 진화시키는 기법이다. 유전 알고리즘을 확장한 것으로 문제 해결에 적합한 프로그램을 찾는다."}], "quiz": [{"question": "퍼지 논리와 불 논리(Boolean Logic)의 차이에 대한 설명으로 옳은 것은?", "options": ["불 논리는 다치 논리이고 퍼지 논리는 참·거짓만 구분한다", "불 논리는 참과 거짓이 확실히 구분되지만 퍼지 논리는 여러 값을 가지는 다치 논리이다", "두 논리 모두 원소의 소속도를 [0,1] 값으로 표현한다", "퍼지 논리는 1965년 이전부터 사용된 고전 논리이다"], "answer": 1, "explanation": "불 논리는 참과 거짓이 확실히 구분되는 반면 퍼지 논리는 여러 값을 가지는 다치 논리이다. 시속 101km와 99km의 과속 판단처럼 경계가 불분명한 경우 퍼지 논리가 불합리함을 피할 수 있다."}, {"question": "퍼지 집합에서 소속 함수 fA(x)에 대한 설명으로 옳지 않은 것은?", "options": ["원소 x가 집합 A에 속하는 정도를 [0,1] 사이 값으로 표현한다", "완전히 속하면 fA(x)=1, 완전히 안 속하면 fA(x)=0이다", "부분적으로 속하면 0 < fA(x) < 1이다", "소속 함수는 반드시 한 명의 전문가 지식으로만 결정해야 한다"], "answer": 3, "explanation": "소속 함수는 한 전문가의 지식, 여러 전문가의 지식, 인공 신경망 이용 등 다양한 방법으로 결정된다. 따라서 한 명의 전문가로만 결정해야 한다는 설명은 틀렸다."}, {"question": "유전 알고리즘의 교차율과 변이율에 대한 설명으로 옳은 것은?", "options": ["교차율은 0.7일 때 좋은 결과를 내고, 변이율은 0.001~0.01로 낮다", "교차율은 0.001~0.01로 낮고, 변이율은 0.7이 적절하다", "교차율과 변이율을 더하면 항상 1이 되어야 한다", "변이는 지역 최적점에 더 빨리 수렴시키기 위한 연산이다"], "answer": 0, "explanation": "교차율은 0.7일 때 좋은 결과를 내는 것으로 알려져 있고, 변이율은 0.001~0.01로 낮다. 변이는 탐색이 지역 최적점에 갇히지 않도록 보장하는 역할을 하며, 더하면 1이 되어야 하는 것은 유전 프로그래밍의 복제율·교차율·변이율이다."}, {"question": "진화 전략(Evolution Strategy)과 유전 알고리즘(Genetic Algorithm)의 차이로 옳은 것은?", "options": ["진화 전략은 교차와 변이를 모두 쓰고 유전 알고리즘은 변이만 쓴다", "진화 전략은 변이만 사용하고 해를 인코딩할 필요가 없으나, 유전 알고리즘은 교차와 변이를 쓰고 해를 염색체로 인코딩한다", "두 기법 모두 해를 반드시 이진 문자열로 인코딩한다", "진화 전략은 존 홀랜드가, 유전 알고리즘은 자데가 창안했다"], "answer": 1, "explanation": "진화 전략은 변이만 사용하며 해를 인코딩할 필요가 없는 반면, 유전 알고리즘은 교차와 변이를 모두 사용하고 해를 염색체라는 인코딩된 형태로 표현한다. 유전 알고리즘은 존 홀랜드가 창안했다."}, {"question": "유전 프로그래밍(Genetic Programming)에 대한 설명으로 옳지 않은 것은?", "options": ["유전 알고리즘을 확장해 이진 문자열 대신 컴퓨터 프로그램을 유전자로 사용한다", "준비 단계에서 말단 집합, 함수 집합, 적합도 함수 등을 결정한다", "복제율, 교차율, 변이율을 모두 더하면 1이 되어야 한다", "이미 대형 컴퓨터 프로그램이 필요한 복잡한 문제도 짧은 시간에 해결할 수 있다"], "answer": 3, "explanation": "유전 프로그래밍은 아직까지 대형 컴퓨터 프로그램이 필요할 정도로 복잡한 문제는 다룰 수 없으며, 다룰 수 있다 해도 수행 시간이 매우 길 것으로 예상된다는 단점이 있다."}], "fill": [{"question": "퍼지 논리는 1965년 캘리포니아 대학 버클리의 ____가 '퍼지 집합' 논문을 발표하며 시작되었다.", "answer": "자데", "accept": ["Zadeh", "자데(Zadeh)"], "explanation": "ch6.json 요약과 키워드에 1965년 자데가 '퍼지 집합' 논문을 발표하며 퍼지 논리가 시작되었다고 명시되어 있다."}, {"question": "퍼지 집합에서 각 원소가 집합에 속하는 정도를 [0,1] 사이 값으로 나타내는 함수를 ____라고 한다.", "answer": "소속 함수", "accept": ["소속함수", "fA(x)"], "explanation": "ch6.json에서 소속 함수 fA(x)는 원소 x가 집합 A에 속하는 정도를 나타내며 완전히 속하면 1, 안 속하면 0, 부분적으로 속하면 0과 1 사이 값을 가진다고 설명한다."}, {"question": "유전 알고리즘은 ____가 창안했으며 교차와 변이를 핵심 연산으로 사용한다.", "answer": "존 홀랜드", "accept": ["존홀랜드", "John Holland", "홀랜드"], "explanation": "ch6.json 요약과 키워드에 유전 알고리즘은 존 홀랜드가 창안했고 교차와 변이를 사용한다고 명시되어 있다."}, {"question": "유전 알고리즘에서 교차 연산자는 교차율이 ____일 때 좋은 결과를 내며, 변이율은 0.001~0.01로 낮게 설정한다.", "answer": "0.7", "accept": ["0.70"], "explanation": "ch6.json에서 교차 연산자는 교차율 0.7에서 좋은 결과를 내고 변이율은 0.001~0.01로 낮다고 설명한다."}]}, {"id": "ch7", "number": 7, "title": "인공지능 기술 III: 인공 신경망·하이브리드 시스템", "summary": [{"heading": "인공 신경망의 개념", "points": ["기계 학습은 컴퓨터가 경험, 예, 유추를 통해 학습할 수 있게 하는 적응 메커니즘으로, 학습이 가능한 시스템을 의미한다.", "컴퓨터 학습은 인간의 학습과 달리 지치지 않고 대량의 데이터를 학습할 수 있다는 특징이 있다.", "인간의 뇌는 100억 개의 뉴런과 6조 개의 시냅스 결합으로 이루어진 복잡하고 비선형적이며 병렬적인 정보 처리 시스템이다.", "인공 신경망은 인간의 뇌를 모델링하여 많은 종류가 개발되었으며, 인간 뇌의 적응성을 활용하여 학습 능력을 구현한다.", "인공 신경망은 퍼셉트론(뉴런)으로 구성되며, 퍼셉트론은 가중치 있는 링크로 서로 연결된다."]}, {"heading": "퍼셉트론 (Perceptron)", "points": ["퍼셉트론은 인공 신경망을 위한 가장 기본적인 단위이며, 인공 신경망의 학습은 가중치의 조정을 의미한다.", "뉴런은 링크로 서로 이어져 있고, 링크에는 가중치가 부여되어 각 입력의 강도를 결정한다.", "퍼셉트론의 출력값(Y)은 각 입력 신호에 대한 가중치의 곱을 더하고, 그 값에 활성화 함수를 적용하여 결정된다.", "퍼셉트론의 출력이 기대되는 출력과 다르면 오차를 계산하고 학습률(α)을 적용하여 가중치(w)를 조정한다.", "퍼셉트론은 초평면을 구성하여 n차원 공간을 두 개의 영역으로 분할하는 역할을 한다.", "학습 절차는 1단계 초기화(가중치와 θ에 -0.5~0.5의 초기 가중치 적용), 2단계 활성화(실제 출력 계산), 3단계 가중치 학습(새 가중치 계산), 4단계 반복(가중치 수렴까지)으로 이루어진다.", "하나의 퍼셉트론은 선형 분리 가능한 함수만 학습할 수 있어, 선형 분리 불가능한 문제에는 적용할 수 없다는 한계가 있다."]}, {"heading": "다층 신경망 (Multilayer Neural Network)", "points": ["다층 신경망은 하나 이상의 은닉층을 가지는 인공 신경망으로, 입력층 하나·하나 이상의 은닉층·출력층 하나로 구성된다.", "각 노드는 퍼셉트론 하나를 의미하며, 자신만의 특정 함수(가중치 등)를 포함한다.", "입력층은 입력 신호를 은닉층으로 전달하며 계산 기능은 포함하지 않는다.", "은닉층은 뉴런의 가중치에 의해 입력값의 특성을 파악하고, 그 계산 결과로부터 전체 신경망의 출력값을 결정한다.", "출력층은 최종 결과를 출력한다."]}, {"heading": "역전파 학습 (Backpropagation Learning)", "points": ["역전파 학습은 퍼셉트론 학습과 유사하게 실제 출력과 목표 출력 간의 차이(오차)를 줄이도록 가중치를 조정한다.", "첫 번째 단계에서는 훈련 입력값을 입력층에 전달하여 은닉층과 출력층으로 계산한다.", "두 번째 단계에서는 실제 출력과 목표 출력을 비교하여 오차를 계산하고, 오차를 출력에서 입력층으로 거꾸로 전파하여 각 뉴런의 가중치를 조정한다.", "학습 단계는 1단계 초기화(균등 분포에 따른 임의의 수 적용), 2단계 활성화, 3단계 가중치 학습(오차 역전파로 가중치 갱신), 4단계 반복으로 구성된다.", "종료는 미리 정해진 오차 기준보다 오차가 작아지거나 정해진 반복 횟수를 학습하면 이루어진다.", "학습에 사용된 데이터에는 높은 성능을 보이지만 새로운 데이터에는 성능이 낮아질 수 있고, 계산량이 방대하여 학습이 느리다."]}, {"heading": "다양한 신경망 형태와 응용 사례", "points": ["피드포워드 신경망은 왼쪽에서 오른쪽으로 신호가 전달된다.", "홉필드 신경망은 출력에서 입력으로 피드백 루프가 있어 과거의 계산 결과가 순환적으로 사용되며, 시간적으로 변화하는 데이터 처리에 사용된다.", "응용 사례로 5x7 크기의 알파벳 'Z' 같은 입력 패턴에 대해 알파벳을 구분하는 시스템이 있다.", "이 사례의 은닉층은 10개의 뉴런으로 구성되며, 이 정도 크기의 입력 패턴에는 충분하다.", "출력층은 26개의 출력 뉴런(알파벳 'A'~'Z')으로 구성되며, 인식된 알파벳에 해당하는 뉴런이 활성화된다."]}, {"heading": "하이브리드 지능 시스템", "points": ["하이브리드 지능 시스템은 두 가지 이상의 지능 기술을 결합하여 각 기술의 장점만을 모아 더 좋은 지능 시스템을 구현한다.", "신경망 전문가 시스템은 인공 신경망과 규칙 기반 전문가 시스템을 결합하고, 전문가 시스템의 기반 지식을 인공 신경망으로 대체하며, 근사 추론으로 오차가 있거나 불완전한 데이터를 다룰 수 있으나 여전히 불 논리의 한계가 있다.", "뉴로-퍼지 시스템은 인공 신경망의 병렬 연산·학습 능력에 퍼지 시스템의 인간적 지식 표현·설명 능력을 결합하며, 일반 구조는 입력층 1개·은닉층 3개·출력층 1개로 은닉층에서 소속 함수와 퍼지 규칙을 표현하고 역전파 알고리즘으로 학습한다.", "진화 신경망은 유전 알고리즘과 인공 신경망을 결합하여, 가중치 연결 위상에 유전 알고리즘을 적용해 최적의 연결 위상을 찾는다.", "퍼지 진화 시스템은 진화 연산과 퍼지 시스템을 결합하여, 진화 연산으로 퍼지 집합의 소속 함수를 조정하고 유전 알고리즘으로 분류 능력이 높은 퍼지 규칙을 적게 생성한다.", "인공지능 미래와 관련해 스티븐 호킹 박사는 인공지능의 발전이 인간에게 무해할 수만은 없다고 경고하며 악용 방지 대책과 윤리적·정책적 대책의 필요성을 강조했다."]}], "keywords": [{"term": "인공 신경망 (Artificial Neural Network)", "explanation": "인간의 뇌를 모델링하여 적응성과 학습 능력을 구현한 시스템으로, 가중치 있는 링크로 연결된 퍼셉트론(뉴런)으로 구성된다."}, {"term": "퍼셉트론 (Perceptron)", "explanation": "인공 신경망의 가장 기본적인 단위로, 입력 신호와 가중치의 곱을 더한 뒤 활성화 함수를 적용해 출력을 계산하며 초평면으로 공간을 두 영역으로 분할한다."}, {"term": "활성화 함수", "explanation": "퍼셉트론의 출력을 계산하기 위해 가중합에 적용하는 함수로, 다양한 종류가 존재한다."}, {"term": "학습률 (α)", "explanation": "퍼셉트론의 출력이 기대 출력과 다를 때 오차를 반영하여 가중치를 조정하는 정도를 결정하는 값이다."}, {"term": "다층 신경망 (Multilayer Neural Network)", "explanation": "하나 이상의 은닉층을 가지는 인공 신경망으로, 입력층·은닉층·출력층으로 구성되며 각 노드가 퍼셉트론에 해당한다."}, {"term": "역전파 학습 (Backpropagation Learning)", "explanation": "실제 출력과 목표 출력의 오차를 출력에서 입력층으로 거꾸로 전파하여 각 뉴런의 가중치를 조정하는 다층 신경망의 학습 방법이다."}, {"term": "홉필드 신경망", "explanation": "출력에서 입력으로 피드백 루프가 있어 과거의 계산 결과가 순환적으로 사용되며, 시간적으로 변화하는 데이터 처리에 활용된다."}, {"term": "하이브리드 지능 시스템", "explanation": "두 가지 이상의 지능 기술을 결합하여 각 기술의 장점만을 모아 더 나은 지능 시스템을 구현한 것이다."}, {"term": "뉴로-퍼지 시스템 (Neuro-Fuzzy System)", "explanation": "인공 신경망의 병렬 연산·학습 능력과 퍼지 시스템의 지식 표현·설명 능력을 결합한 시스템으로, IF-THEN 퍼지 규칙과 소속 함수를 학습할 수 있다."}, {"term": "진화 신경망 (Evolutionary Neural Network)", "explanation": "유전 알고리즘과 인공 신경망을 결합하여, 가중치 연결 위상에 유전 알고리즘을 적용해 최적의 연결 위상을 찾는 시스템이다."}], "quiz": [{"question": "단일 퍼셉트론의 한계로 옳은 것은?", "options": ["비선형 활성화 함수를 사용할 수 없다.", "선형 분리 가능한 함수만 학습할 수 있고 선형 분리 불가능한 문제에는 적용할 수 없다.", "가중치를 전혀 조정할 수 없다.", "입력 신호를 두 개까지만 받을 수 있다."], "answer": 1, "explanation": "하나의 퍼셉트론은 초평면으로 공간을 두 영역으로 나누므로 선형 분리 가능한 함수만 학습할 수 있고, 선형 분리 불가능한 문제에는 적용할 수 없다는 한계가 있다."}, {"question": "다층 신경망의 역전파 학습에 대한 설명으로 옳지 않은 것은?", "options": ["실제 출력과 목표 출력 간의 오차를 줄이도록 가중치를 조정한다.", "오차를 출력에서 입력층으로 거꾸로 전파하여 각 뉴런의 가중치를 조정한다.", "계산량이 방대하여 학습이 느리다.", "학습에 사용된 데이터뿐 아니라 새로운 데이터에도 항상 동일하게 높은 성능을 보인다."], "answer": 3, "explanation": "역전파 학습은 학습에 사용된 데이터에는 높은 성능을 보이지만 새롭게 주어진 데이터에 대해서는 성능이 낮아질 수 있으므로, 항상 동일하게 높은 성능을 보인다는 설명은 옳지 않다."}, {"question": "다층 신경망에서 각 층의 역할을 바르게 짝지은 것은?", "options": ["입력층은 입력값의 특성을 파악하는 계산을 수행한다.", "은닉층은 단순히 입력 신호를 전달만 하고 계산 기능이 없다.", "은닉층은 뉴런의 가중치로 입력값의 특성을 파악하고, 그 결과로부터 전체 출력값을 결정한다.", "출력층은 입력 신호를 은닉층으로 전달한다."], "answer": 2, "explanation": "입력층은 신호 전달만 하고 계산 기능이 없으며, 은닉층이 가중치로 입력값의 특성을 파악해 전체 출력값을 결정하고, 출력층이 최종 결과를 출력한다."}, {"question": "하이브리드 지능 시스템의 결합 형태에 대한 설명으로 옳은 것은?", "options": ["뉴로-퍼지 시스템은 유전 알고리즘과 인공 신경망을 결합한 것이다.", "진화 신경망은 인공 신경망의 가중치 연결 위상에 유전 알고리즘을 적용해 최적의 연결 위상을 찾는다.", "신경망 전문가 시스템은 불 논리의 한계를 완전히 극복한다.", "퍼지 진화 시스템은 인공 신경망과 규칙 기반 전문가 시스템을 결합한 것이다."], "answer": 1, "explanation": "진화 신경망은 유전 알고리즘과 인공 신경망을 결합하여 가중치 연결 위상에 유전 알고리즘을 적용해 최적의 연결 위상을 찾는다. 신경망 전문가 시스템은 여전히 불 논리의 한계가 있고, 뉴로-퍼지는 신경망과 퍼지의 결합이다."}, {"question": "알파벳 인식 인공 신경망 응용 사례에 대한 설명으로 옳은 것은?", "options": ["은닉층은 26개의 뉴런으로 구성된다.", "출력층은 10개의 출력 뉴런으로 구성된다.", "출력층은 26개의 출력 뉴런(알파벳 'A'~'Z')으로 구성되며 인식된 알파벳에 해당하는 뉴런이 활성화된다.", "입력 패턴은 10x10 크기로 고정되어 있다."], "answer": 2, "explanation": "해당 사례에서 은닉층은 10개의 뉴런으로 구성되고, 출력층은 알파벳 'A'~'Z'에 대응하는 26개의 출력 뉴런으로 구성되어 인식된 알파벳에 해당하는 뉴런이 활성화된다."}], "fill": [{"question": "인공 신경망의 가장 기본적인 단위는 ____이며, 가중치 있는 링크로 서로 연결되어 신경망을 구성한다.", "answer": "퍼셉트론", "accept": ["Perceptron", "perceptron", "뉴런"], "explanation": "퍼셉트론(뉴런)은 인공 신경망을 위한 가장 기본적인 단위로, 가중치 있는 링크로 서로 연결된다고 명시되어 있다."}, {"question": "실제 출력과 목표 출력의 오차를 출력에서 입력층으로 거꾸로 전파하여 각 뉴런의 가중치를 조정하는 다층 신경망의 학습 방법을 ____ 학습이라 한다.", "answer": "역전파", "accept": ["Backpropagation", "backpropagation", "오차 역전파"], "explanation": "역전파 학습은 오차를 출력에서 입력층으로 거꾸로 전파하여 각 뉴런의 가중치를 조정하는 다층 신경망의 학습 방법이라고 정의되어 있다."}, {"question": "알파벳 인식 응용 사례에서 출력층은 알파벳 'A'~'Z'에 대응하는 ____개의 출력 뉴런으로 구성되며, 인식된 알파벳에 해당하는 뉴런이 활성화된다.", "answer": "26", "accept": ["26개", "이십육"], "explanation": "해당 사례의 출력층은 알파벳 'A'~'Z'에 대응하는 26개의 출력 뉴런으로 구성된다고 기술되어 있다."}, {"question": "인공 신경망의 병렬 연산·학습 능력과 퍼지 시스템의 인간적 지식 표현·설명 능력을 결합한 하이브리드 시스템을 ____ 시스템이라 한다.", "answer": "뉴로-퍼지", "accept": ["Neuro-Fuzzy", "뉴로퍼지", "뉴로-퍼지 시스템"], "explanation": "뉴로-퍼지 시스템은 인공 신경망의 병렬 연산·학습 능력과 퍼지 시스템의 지식 표현·설명 능력을 결합한 시스템으로 정의되어 있다."}]}, {"id": "ch8", "number": 8, "title": "플랫폼의 이해: 의미·유형·중요성·미래 가치", "summary": [{"heading": "플랫폼의 의미와 어원", "points": ["플랫폼은 다양한 주체들을 연결하고 상호작용을 촉진하여 새로운 가치를 창출하는 기반이자 매개체이다.", "어원은 프랑스어 'plateforme'로, 'plat(평평한)'과 'forme(형태)'의 합성어이다.", "사전적 의미는 주변보다 높은 평평한 장소, 강단, 연단, 발판 등을 가리킨다.", "확장된 개념으로는 다른 곳으로 진출하기 위해 이용하는 수단을 비유하며 발판·기반·매개의 의미를 가진다.", "경제학적으로는 거래를 원하는 복수의 집단들을 연결해주는 경제 주체들의 중개 수단으로 정의된다.", "산업적으로는 문화·예술·경영학·사회학 등 많은 산업에서 기반 또는 매개라는 의미로 사용된다."]}, {"heading": "현실의 예와 외형에 따른 구분", "points": ["기차역의 플랫폼(승강장)은 승객이 타고 내리는 장소이며, 컴퓨터 업계에서는 시스템의 기반이 되는 하드웨어(CPU, AP)나 소프트웨어(운영체제)를 의미한다.", "인터넷 업계에서 플랫폼은 사용자들이 만나 상호작용하고 판매자와 구매자가 거래하며 가치가 창출되는 공간(SNS, E-Commerce Service)을 뜻한다.", "외형에 따른 구분으로 현실계(physical world) 플랫폼은 백화점, 재래시장, 온라인-오프라인 은행, 부동산 중개업소, 건설 인력 시장 등 실생활 비즈니스에 존재한다.", "IT 플랫폼 중 하드웨어 기반 플랫폼은 CPU, 모바일 AP, 콘솔 게임기, 전자책 전용 단말기 등 실물 형태의 IT 제품이다.", "소프트웨어 플랫폼은 응용 프로그램 개발 환경과 구동 환경을 제공하며 미들웨어(Adobe Flash, Oracle DB)와 운영체제(MS Windows, Android, iOS)가 있다.", "인터넷 서비스 플랫폼은 사용자들을 매개하는 인터넷 서비스를 통칭한다."]}, {"heading": "역할에 따른 구분: 기반형·매개형·복합형", "points": ["기반형 플랫폼은 사용자가 요구하는 기능을 구현하는 기반으로서, 운영체제(Windows, Android), CPU, 모바일 AP 등이 대표적이다.", "운영체제(OS)는 컴퓨터 시스템 작동에 필수적이며 SDK를 통해 애플리케이션을 만들어 확장성을 제공하고, 선순환 메커니즘으로 지속성을 확보한다.", "매개형 플랫폼은 사용자들을 매개하여 상호작용을 창출하는 공간으로 SNS(페이스북, 카카오스토리)와 오픈 마켓(11번가, G마켓) 등이 있다.", "오픈 마켓은 다수의 판매자와 저렴한 가격이 최대 장점이며 한 건의 거래가 한 건의 수수료 수익을 창출하는 비즈니스 모델이다.", "소셜 커머스는 소셜 미디어를 활용하는 커머스로, 그루폰(Groupon) 모델을 모방해 지역 상점의 상품·서비스를 반짝 세일(flash sale)하는 쇼핑몰이다.", "복합형 플랫폼은 기반형과 매개형 성격을 복합적으로 가지며, 애플리케이션 생태계 장악과 서비스를 통한 지속적 수익 창출을 궁극적으로 지향한다.", "복합형 등장 유형에는 기반형으로 시작해 매개형으로 진화(MS Windows), 매개형으로 시작해 기반형으로 진화(Facebook), 처음부터 두 성격을 갖추고 시작(Android)하는 경우가 있다."]}, {"heading": "플랫폼의 중요성과 시대 변화", "points": ["2016년 글로벌 브랜드 가치 상위 기업들은 대부분 플랫폼 기업이며 글로벌 플랫폼 경제 규모가 크게 성장하고 있다.", "시대 변화의 동력으로 과거는 Networks 시대, 현재는 Platforms 시대, 미래는 Data 시대로 구분된다.", "선형 파이프 모델은 원재료 생산자 → 생산 → 조립 → 유통 → 소비자로 이어지는 전통적 선형 가치 사슬이다.", "삼각 플랫폼 모델은 다양한 주체들이 플랫폼을 통해 상호작용하며 가치를 창출하는 모델이다.", "iTunes 및 Apple Music과 결합한 Apple의 iPod 가치 사슬은 플랫폼 모델의 예시이다."]}, {"heading": "주요 플랫폼 기업 사례: 애플과 구글", "points": ["애플(Apple)은 HW, SW, 콘텐츠를 융합한 플랫폼 전략을 유지하며 iTunes, iTunes Store, macOS X, iPhone 등으로 하드웨어·소프트웨어 통합 생태계를 구축했다.", "애플은 강한 충성도의 고객층과 스타트업 같은 집중적 조직 문화를 가지며 디자이너·엔지니어 그룹(DEST)의 탁월한 역량과 강력한 SCM(공급망 관리) 역량을 보유한다.", "구글(Google)은 검색 엔진 분야 강자로 매개형 플랫폼으로서 수익 모델을 창출하며, 검색 엔진에 광고 수익 모델을 결합하고 프리미엄(freemium) 전략을 사용한다.", "구글은 Android와 Youtube 인수로 플랫폼을 확장했고 자유와 공유를 추구하는 조직 문화를 가진다.", "구글은 20퍼센트의 시간 제도 운영과 실패를 장려하는 회사 문화를 통해 혁신을 추구한다."]}, {"heading": "네트워크 효과와 성공 요소", "points": ["플랫폼은 네트워크 효과를 충분히 이용하며, 더 많은 사용자가 유입될수록 더 많은 가치를 창출하고 이는 다시 더 많은 사용자를 유입시키는 선순환 구조를 가진다.", "전화기 연결 수 증가처럼 사용자 수가 늘어날수록 플랫폼의 가치는 기하급수적으로 증가한다(양면 네트워크 효과, Two-sided Network Effect).", "플랫폼의 성공 요소로 킬러 앱(Killer App)은 플랫폼의 핵심적 매력을 제공하는 애플리케이션이다.", "네트워크 효과(Network Effect)는 사용자 수가 증가할수록 플랫폼의 가치가 증대되는 효과이다.", "로열티(Loyalty, 충성도)는 플랫폼에 대한 사용자들의 강한 애착과 지속적 이용을 의미한다."]}], "keywords": [{"term": "플랫폼(plateforme)", "explanation": "프랑스어 'plat(평평한)'과 'forme(형태)'의 합성어로, 다양한 주체들을 연결하고 상호작용을 촉진하여 새로운 가치를 창출하는 기반이자 매개체를 의미한다."}, {"term": "기반형 플랫폼", "explanation": "사용자가 요구하는 기능을 구현하는 기반으로서의 플랫폼으로, 운영체제(Windows, Android), CPU, 모바일 AP 등이 대표적이다."}, {"term": "매개형 플랫폼", "explanation": "사용자들을 매개하여 상호작용을 창출하는 공간으로서의 플랫폼이며, SNS(페이스북, 카카오스토리)와 오픈 마켓(11번가, G마켓) 등이 있다."}, {"term": "복합형 플랫폼", "explanation": "기반형과 매개형 성격을 복합적으로 가지며, 애플리케이션 생태계 장악과 서비스를 통한 지속적 수익 창출을 지향한다(예: MS Windows, Facebook, Android)."}, {"term": "오픈 마켓(Open Market)", "explanation": "다수의 판매자와 저렴한 가격이 최대 장점인 매개형 플랫폼으로, 한 건의 거래가 한 건의 수수료 수익을 창출하는 비즈니스 모델이다."}, {"term": "소셜 커머스", "explanation": "소셜 미디어를 활용하는 커머스로, 그루폰(Groupon) 모델을 모방하여 지역 상점의 상품·서비스를 반짝 세일(flash sale)하는 쇼핑몰이다."}, {"term": "선형 파이프 모델 vs 삼각 플랫폼 모델", "explanation": "선형 파이프 모델은 원재료 생산자→생산→조립→유통→소비자로 이어지는 전통적 선형 가치 사슬이고, 삼각 플랫폼 모델은 다양한 주체가 플랫폼을 통해 상호작용하며 가치를 창출하는 모델이다."}, {"term": "양면 네트워크 효과(Two-sided Network Effect)", "explanation": "사용자가 많이 유입될수록 더 많은 가치가 창출되고 이것이 다시 사용자 유입을 늘리는 선순환 구조로, 사용자 수 증가에 따라 플랫폼 가치가 기하급수적으로 증가한다."}, {"term": "킬러 앱(Killer App)", "explanation": "플랫폼의 핵심적인 매력을 제공하는 애플리케이션으로, 플랫폼의 성공 요소 중 하나이다."}, {"term": "프리미엄(freemium) 전략", "explanation": "구글이 사용하는 수익 전략으로, 검색 엔진에 광고 수익 모델을 결합하는 등 매개형 플랫폼의 수익 창출 방식과 함께 활용된다."}], "quiz": [{"question": "플랫폼의 어원에 대한 설명으로 옳은 것은?", "options": ["프랑스어 'plateforme'에서 유래했으며 'plat(평평한)'과 'forme(형태)'의 합성어이다", "라틴어 'platea'에서 유래했으며 '시장'을 의미한다", "영어 'plate'와 'form'의 합성어로 '접시 형태'를 의미한다", "독일어 'Plattform'에서 유래했으며 '연결망'을 의미한다"], "answer": 0, "explanation": "플랫폼은 프랑스어 'plateforme'에서 유래했으며 'plat(평평한)'과 'forme(형태)'의 합성어로, 주변보다 높은 평평한 장소·강단·발판 등을 의미한다."}, {"question": "역할에 따른 플랫폼 구분 중 '매개형 플랫폼'에 해당하는 것은?", "options": ["운영체제(Windows, Android)", "CPU와 모바일 AP", "SNS(페이스북, 카카오스토리)와 오픈 마켓(11번가, G마켓)", "전자책 전용 단말기"], "answer": 2, "explanation": "매개형 플랫폼은 사용자들을 매개하여 상호작용을 창출하는 공간으로 SNS와 오픈 마켓이 해당한다. 운영체제·CPU·모바일 AP는 기반형 플랫폼, 전자책 단말기는 하드웨어 기반 플랫폼이다."}, {"question": "복합형 플랫폼의 등장 유형과 사례 연결로 옳지 않은 것은?", "options": ["기반형으로 시작하여 매개형으로 진화 - MS Windows", "매개형으로 시작하여 기반형으로 진화 - Facebook", "처음부터 기반형과 매개형 성격을 갖추고 시작 - Android", "기반형으로만 끝까지 유지 - Google 검색"], "answer": 3, "explanation": "복합형 플랫폼의 등장 유형은 기반형→매개형 진화(MS Windows), 매개형→기반형 진화(Facebook), 처음부터 두 성격을 갖춘 시작(Android) 세 가지이며, '기반형으로만 끝까지 유지'는 복합형 유형에 해당하지 않는다."}, {"question": "시대 변화의 동력에 대한 설명으로 옳은 것은?", "options": ["과거 Data 시대 → 현재 Networks 시대 → 미래 Platforms 시대", "과거 Networks 시대 → 현재 Platforms 시대 → 미래 Data 시대", "과거 Platforms 시대 → 현재 Data 시대 → 미래 Networks 시대", "과거 Networks 시대 → 현재 Data 시대 → 미래 Platforms 시대"], "answer": 1, "explanation": "강의 자료는 시대 변화의 동력을 과거 Networks 시대, 현재 Platforms 시대, 미래 Data 시대로 구분한다."}, {"question": "플랫폼의 성공 요소에 대한 설명으로 옳지 않은 것은?", "options": ["킬러 앱(Killer App)은 플랫폼의 핵심적인 매력을 제공하는 애플리케이션이다", "네트워크 효과는 사용자 수가 증가할수록 플랫폼의 가치가 증대되는 효과이다", "로열티(충성도)는 플랫폼에 대한 사용자들의 강한 애착과 지속적 이용을 의미한다", "선형 파이프 모델은 플랫폼의 핵심 성공 요소로 가치를 기하급수적으로 증대시킨다"], "answer": 3, "explanation": "플랫폼의 성공 요소는 킬러 앱, 네트워크 효과, 로열티(충성도)이다. 선형 파이프 모델은 전통적 선형 가치 사슬로 플랫폼 모델과 대비되는 개념이므로 성공 요소가 아니다."}], "fill": [{"question": "플랫폼의 어원은 프랑스어 'plateforme'로, 'plat(평평한)'과 '____(형태)'의 합성어이다.", "answer": "forme", "accept": ["forme(형태)", "포름"], "explanation": "플랫폼은 프랑스어 'plat(평평한)'과 'forme(형태)'가 결합한 합성어이다."}, {"question": "역할에 따른 구분에서 사용자가 요구하는 기능을 구현하는 기반으로서 운영체제·CPU·모바일 AP 등이 대표적인 플랫폼은 ____ 플랫폼이다.", "answer": "기반형", "accept": ["기반형 플랫폼"], "explanation": "기반형 플랫폼은 사용자가 요구하는 기능을 구현하는 기반으로, 운영체제(Windows, Android)·CPU·모바일 AP 등이 해당한다."}, {"question": "시대 변화의 동력은 과거 Networks 시대, 현재 Platforms 시대, 미래 ____ 시대로 구분된다.", "answer": "Data", "accept": ["데이터", "data"], "explanation": "강의 자료는 시대 변화를 과거 Networks, 현재 Platforms, 미래 Data 시대로 구분한다."}, {"question": "플랫폼의 성공 요소 중 ____은(는) 플랫폼의 핵심적인 매력을 제공하는 애플리케이션을 의미한다.", "answer": "킬러 앱", "accept": ["Killer App", "킬러앱"], "explanation": "킬러 앱(Killer App)은 플랫폼의 핵심적 매력을 제공하는 애플리케이션으로, 플랫폼의 성공 요소 중 하나이다."}]}, {"id": "ch9", "number": 9, "title": "스마트 디바이스와 창업 지원 플랫폼", "summary": [{"heading": "오픈 소스 하드웨어(OSHW) 플랫폼 개요", "points": ["스마트 디바이스 개발 플랫폼은 오픈 소스 하드웨어(Open Source HW, OSHW) 플랫폼을 기반으로 한다.", "OSHW의 확대로 개발 기간 단축 및 생산 비용 절감이라는 혁신이 이루어지고 있다.", "웨어러블 기기, 사물 인터넷(IoT)용 소형 가전, 완구 등 다양한 분야에 적용 가능하다.", "대표적인 오픈 소스 하드웨어로는 아두이노(Arduino), 라즈베리 파이(Raspberry Pi), 비글 보드(Beagle Board)가 있다."]}, {"heading": "대표 OSHW 1: 아두이노(Arduino)", "points": ["다양한 보드 종류와 쉴드(shield)를 통해 확장성을 제공하는 것이 특징이다.", "통합 개발 환경으로 UTF-8 기반의 편집기, ATmega용 AVR-GCC 컴파일러를 제공한다.", "USB-UART 변환을 통한 MCU 부트로더 업로드 기능을 제공한다.", "등록된 라이브러리 목록 및 예제를 통해 개발을 지원한다."]}, {"heading": "대표 OSHW 2: 라즈베리 파이(Raspberry Pi)와 비글 보드(Beagle Board)", "points": ["라즈베리 파이는 리눅스 커널 기반 운영 체제를 사용하며, 최적화된 데비안 계열의 자유 운영 체제인 Raspbian을 사용한다.", "라즈베리 파이는 파이썬 사용을 촉진하며, BBC 베이직, C, C++, 자바, 펄, 루비, 스퀵 스몰토크 등의 언어를 지원한다.", "라즈베리 파이의 종류로는 Pi 1, Pi 2, Compute Module, Pi Zero, Pi 3 등 다양한 모델이 있다.", "비글 보드는 대략 75mm x 75mm 크기로, 간단한 컴퓨터의 모든 기능을 가지고 있다.", "비글 보드는 AM335x 720MHz ARM 코텍스-A8 프로세서, SGX530 GPU, ARM Cortex-M3 전력 제어, LPDDR1/DDR2/DDR3 메모리 등을 포함한다.", "비글 보드는 USB 클라이언트/호스트, 이더넷, 2x 46핀 헤더(I2C, UART, I2S, SPI, CAN, GPIO, ADC) 등의 외부 연결을 지원한다."]}, {"heading": "창업 지원 플랫폼과 창업 생태계", "points": ["창업 생태계는 창업자, 대학 등 창업 지원 기관, 투자자 등이 유기적으로 상호 작용하여 지속적으로 창업이 활성화되는 환경이다.", "창업 생태계는 보육, 자금, 혁신과 같은 기능별 주요 플랫폼으로 구성된다."]}, {"heading": "메이커 운동(Maker Movement)과 메이커 페어(Maker Faire)", "points": ["메이커 운동은 오라일리의 공동 창업자였던 데일 도허티가 2005년 처음 도입한 단어이다.", "스스로 필요한 것을 만드는 메이커들이 기술을 다른 사람들과 함께 고민하고 공유하는 활동을 통칭한다.", "과거 개인 취미 활동(DIY)에서 발전하여 '공유'와 '공동체' 개념이 강조되면서 소량 생산을 통한 상업화까지 영역이 확대되고 있다.", "2005년 잡지 'Make'와 2006년 '메이커 페어(Maker Faire)' 개최 이후, 오바마 정부의 '제조업 혁신 네트워크(NNMI) 정책'과 'Maker Challenge'를 통해 활성화되었다.", "메이커 페어는 4차 산업혁명의 난장판이자 메이커들의 축제 현장으로, 누구나 참여할 수 있다.", "메이커 페어 전시품은 3D 프린터, 레이저 커터를 활용한 전시품이 상당수를 차지하며, 미국 Tech 공룡들이 자사 홍보의 장으로 활용한다."]}, {"heading": "메이커 스페이스(Makerspace)", "points": ["메이커 스페이스는 도구가 있는 커뮤니티 센터를 의미하며, 혼자서 하기 힘든 기술적, 자원적인 실험들을 할 수 있는 공간이다.", "느슨한 개인의 조직들이 공간과 도구를 공유하며, 영리/비영리 기관(학교, 대학, 도서관) 등 어떤 형태로든 존재할 수 있다.", "Makerspace.com과 같은 온라인 커뮤니티로 메이커들을 연결하고 새로운 도구와 프로젝트에 참여할 수 있게 돕는다.", "국내에도 다양한 메이커 스페이스가 존재한다."]}], "keywords": [{"term": "오픈 소스 하드웨어(OSHW, Open Source HW)", "explanation": "설계 정보가 공개된 하드웨어 플랫폼으로, 개발 기간 단축과 생산 비용 절감을 가능하게 하며 웨어러블, IoT 소형 가전, 완구 등에 적용된다."}, {"term": "아두이노(Arduino)", "explanation": "다양한 보드와 쉴드로 확장성을 제공하는 OSHW로, UTF-8 편집기와 ATmega용 AVR-GCC 컴파일러, USB-UART 변환을 통한 부트로더 업로드 기능을 제공한다."}, {"term": "라즈베리 파이(Raspberry Pi)", "explanation": "리눅스 커널 기반의 데비안 계열 자유 운영 체제 Raspbian을 사용하며 파이썬 사용을 촉진하는 OSHW로, Pi 1, Pi Zero, Pi 3 등 다양한 모델이 있다."}, {"term": "비글 보드(Beagle Board)", "explanation": "약 75mm x 75mm 크기로 간단한 컴퓨터의 모든 기능을 가지며, AM335x 720MHz ARM 코텍스-A8 프로세서와 다양한 외부 연결 인터페이스를 지원하는 OSHW이다."}, {"term": "창업 생태계", "explanation": "창업자, 대학 등 창업 지원 기관, 투자자 등이 유기적으로 상호 작용하여 지속적으로 창업이 활성화되는 환경으로, 보육·자금·혁신 기능별 플랫폼으로 구성된다."}, {"term": "메이커 운동(Maker Movement)", "explanation": "오라일리 공동 창업자 데일 도허티가 2005년 도입한 용어로, 스스로 필요한 것을 만드는 메이커들이 기술을 함께 고민하고 공유하는 활동을 통칭한다."}, {"term": "메이커 페어(Maker Faire)", "explanation": "누구나 참여할 수 있는 메이커들의 축제 현장으로, 3D 프린터·레이저 커터 활용 전시품이 많고 미국 Tech 기업들이 홍보의 장으로 활용한다."}, {"term": "메이커 스페이스(Makerspace)", "explanation": "도구가 있는 커뮤니티 센터로, 혼자 하기 힘든 기술적·자원적 실험을 할 수 있는 공간이며 학교·대학·도서관 등 영리/비영리 형태로 존재할 수 있다."}, {"term": "제조업 혁신 네트워크(NNMI) 정책", "explanation": "오바마 정부가 추진한 정책으로, 'Maker Challenge'와 함께 메이커 운동을 활성화하는 데 기여하였다."}], "quiz": [{"question": "다음 중 본문에서 제시한 대표적인 오픈 소스 하드웨어(OSHW)에 해당하지 않는 것은?", "options": ["아두이노(Arduino)", "라즈베리 파이(Raspberry Pi)", "비글 보드(Beagle Board)", "라즈비안(Raspbian)"], "answer": 3, "explanation": "본문에서 제시한 대표적 OSHW는 아두이노, 라즈베리 파이, 비글 보드이다. Raspbian은 라즈베리 파이에 최적화된 데비안 계열의 운영 체제 이름이지 하드웨어가 아니다."}, {"question": "라즈베리 파이(Raspberry Pi)에 대한 설명으로 옳은 것은?", "options": ["ATmega용 AVR-GCC 컴파일러를 핵심 통합 개발 환경으로 제공한다.", "리눅스 커널 기반의 데비안 계열 운영 체제인 Raspbian을 사용하며 파이썬 사용을 촉진한다.", "약 75mm x 75mm 크기로 2x 46핀 헤더 외부 연결을 지원한다.", "다양한 쉴드(shield)를 통해 확장성을 제공하는 것이 가장 큰 특징이다."], "answer": 1, "explanation": "라즈베리 파이는 리눅스 커널 기반 데비안 계열의 자유 운영 체제 Raspbian을 사용하고 파이썬 사용을 촉진한다. AVR-GCC 컴파일러와 쉴드는 아두이노, 75mm x 75mm 크기와 46핀 헤더는 비글 보드의 특징이다."}, {"question": "메이커 운동(Maker Movement)에 대한 설명으로 옳은 것은?", "options": ["마이크로소프트의 창업자가 2010년 처음 도입한 용어이다.", "오라일리의 공동 창업자였던 데일 도허티가 2005년 처음 도입한 용어이다.", "기업의 대량 생산 효율화를 위해 시작된 산업 운동이다.", "개인 취미(DIY)에 머무르며 상업화와는 무관한 활동이다."], "answer": 1, "explanation": "메이커 운동은 오라일리의 공동 창업자였던 데일 도허티가 2005년 처음 도입한 용어이다. 또한 DIY에서 발전해 '공유'와 '공동체' 개념이 강조되며 소량 생산을 통한 상업화까지 영역이 확대되고 있다."}, {"question": "메이커 스페이스(Makerspace)에 대한 설명으로 옳지 않은 것은?", "options": ["도구가 있는 커뮤니티 센터로, 혼자서 하기 힘든 기술적·자원적 실험을 할 수 있는 공간이다.", "느슨한 개인의 조직들이 공간과 도구를 공유하며, 학교·대학·도서관 등 영리/비영리 어떤 형태로든 존재할 수 있다.", "3D 프린터·레이저 커터 활용 전시품이 상당수를 차지하고 미국 Tech 기업들이 자사 홍보의 장으로 활용하는, 누구나 참여하는 축제 현장이다.", "Makerspace.com과 같은 온라인 커뮤니티로 메이커들을 연결하고 새로운 도구와 프로젝트에 참여하도록 돕는다."], "answer": 2, "explanation": "메이커 스페이스는 도구가 있는 커뮤니티 센터로 혼자 하기 힘든 기술적·자원적 실험을 하는 상시 공간이며(A), 느슨한 개인 조직들이 공간·도구를 공유하고 학교·대학·도서관 등 영리/비영리 어떤 형태로든 존재할 수 있고(B), Makerspace.com 같은 온라인 커뮤니티로 메이커들을 연결한다(D). 반면 C는 메이커 페어(Maker Faire)에 대한 설명이다. 3D 프린터·레이저 커터 전시품이 상당수를 차지하고 미국 Tech 기업이 홍보의 장으로 활용하는 '누구나 참여하는 축제 현장'은 메이커 페어이지 메이커 스페이스가 아니므로, 메이커 스페이스 설명으로는 옳지 않다."}, {"question": "메이커 운동의 발전 및 정부 지원과 관련된 연도·정책 연결로 옳은 것은?", "options": ["2005년 잡지 'Make' 창간, 2006년 메이커 페어 개최, 오바마 정부의 NNMI 정책으로 활성화", "2006년 잡지 'Make' 창간, 2005년 메이커 페어 개최, 클린턴 정부 정책으로 활성화", "2005년 잡지 'Make' 창간, 2006년 메이커 페어 개최, 트럼프 정부의 Maker Challenge로 활성화", "2010년 잡지 'Make' 창간, 2012년 메이커 페어 개최, 오바마 정부 정책으로 활성화"], "answer": 0, "explanation": "본문에 따르면 2005년 잡지 'Make'와 2006년 '메이커 페어' 개최 이후, 오바마 정부의 '제조업 혁신 네트워크(NNMI) 정책'과 'Maker Challenge'를 통해 메이커 운동이 활성화되었다."}], "fill": [{"question": "아두이노(Arduino)는 통합 개발 환경으로 UTF-8 기반의 편집기와 ATmega용 ____ 컴파일러를 제공한다.", "answer": "AVR-GCC", "accept": ["AVR GCC", "avr-gcc"], "explanation": "본문은 아두이노가 ATmega용 AVR-GCC 컴파일러를 제공한다고 명시한다."}, {"question": "라즈베리 파이(Raspberry Pi)는 리눅스 커널 기반 운영 체제를 사용하며, 데비안 계열의 자유 운영 체제인 ____을 사용한다.", "answer": "Raspbian", "accept": ["라즈비안", "RASPBIAN"], "explanation": "본문은 라즈베리 파이가 데비안 계열의 자유 운영 체제 Raspbian을 사용한다고 설명한다."}, {"question": "메이커 운동(Maker Movement)은 오라일리의 공동 창업자였던 ____가 2005년 처음 도입한 단어이다.", "answer": "데일 도허티", "accept": ["Dale Dougherty", "데일도허티"], "explanation": "본문은 메이커 운동이 오라일리 공동 창업자 데일 도허티가 2005년 처음 도입한 용어라고 밝힌다."}, {"question": "오바마 정부는 메이커 운동 활성화를 위해 'Maker Challenge'와 함께 제조업 혁신 네트워크 정책인 ____ 정책을 추진하였다.", "answer": "NNMI", "accept": ["엔엔엠아이", "N.N.M.I"], "explanation": "본문은 오바마 정부의 '제조업 혁신 네트워크(NNMI) 정책'과 'Maker Challenge'를 통해 메이커 운동이 활성화되었다고 설명한다."}]}, {"id": "ch10", "number": 10, "title": "소셜 플랫폼과 모바일 플랫폼", "summary": [{"heading": "소셜 플랫폼의 개념", "points": ["정의: 의사소통 등 일상생활부터 조직 운영과 비즈니스에 이르기까지 인간 행위의 모든 분야에 소셜화를 가능하게 하는 기반이다.", "사회적 자본 형성: '사람'을 중심으로 한 사회적 관계 형성이 사회적 자본(social capital)을 형성하는 기반으로 작용한다.", "가치 극대화: 기술적·산업적 가치와 이용자 중심의 사회적 가치 결합을 촉진하여 사회 전체 가치를 극대화한다."]}, {"heading": "소셜 플랫폼 활용 사례", "points": ["Facebook과 HuffPost의 소셜 뉴스 서비스: 소셜 네트워크 접목으로 단기간에 Washington Post를 추월했다.", "Naked Pizza: Twitter 마케팅(간판에 트위터 주소 표시)으로 몇 달 내 매출이 20% 신장했다.", "링크드인(LinkedIn): 200여 개국 1억 명 이상의 회원을 보유하며 구직자·창업자 등에게 인맥 형성을 지원한다.", "킥스타터(Kickstarter): 세계 최대의 인터넷 기반 온라인 펀딩 플랫폼으로 크라우드 펀딩 서비스를 제공한다.", "키바(Kiva): 개발도상국 사업에 자금을 지원하여 도움이 필요한 사람의 학업 및 창업을 지원한다."]}, {"heading": "주요 글로벌 플랫폼 기업", "points": ["Facebook(소셜 네트워크): 2004년 2월 4일 설립, 10년 만에 매월 약 15억 명 접속, 미국 인구의 41.6%가 계정 보유. 뉴스피드·타임라인·페이지·그룹과 앱센터(App Center) 기반 개발자 생태계를 제공한다.", "Amazon(커머스): 1994년 7월 제프 베조스 설립, 유통업체 시가총액 1위로 월마트 추월. 온라인 서점에서 제품군 다양화, 킨들·킨들 파이어, AWS 클라우드, 대시 버튼, 에코·알렉사 음성 서비스를 운영한다.", "아마존 프라임: 연 99달러 회비로 이틀 무료 배송, 콘텐츠 스트리밍, 책 대여, 무제한 사진 저장 등 락인(Lock-In) 서비스를 제공한다.", "Alibaba Group: 커머스와 금융 양쪽 플랫폼 소유, 시가총액 4위 IT 기업. B2B·B2C에서 막강한 지위를 가지며 알리바바닷컴, 타오바오, 알리페이(3억 명 이상 사용자), 위어바오를 운영한다.", "샤오미(Xiaomi): 2010년 8월 창립, 세계 4번째 규모 스마트폰 제조업체. 카피캣으로 출발했으나 가격·디자인·품질로 성공, 안드로이드 기반 MIUI와 '미펀(Mi Fen)' 팬덤, 소프트웨어 역량을 차별화 요소로 삼는다."]}, {"heading": "모바일 플랫폼과 3강의 전략", "points": ["변화의 중심은 '소프트웨어'로, 소프트웨어가 플랫폼의 중심이 되고 하드웨어를 완성하는 요소로 자리 잡았다.", "애플이 모바일 플랫폼 개념을 처음 도입했으며, 모바일 시장은 구글·애플·삼성전자의 3강 체제이다.", "애플: 전통적인 '하드웨어+소프트웨어' 방식으로 1년에 한 번 스마트폰을 내놓고, 앱스토어로 앱 유통권을 직접 쥐며 개발자 생태계를 완성한다.", "구글: 하드웨어 없이 서비스 중심 플랫폼으로, 안드로이드를 통해 구글 서비스를 중심에 놓고 '개방' 전략으로 업계의 '절대 선' 역할을 했다.", "삼성전자: 하드웨어 자체가 플랫폼이 되는 전략으로, 안드로이드에 집중하며 1GHz 이상·듀얼/쿼드코어 프로세서를 가장 먼저 사용하고 갤럭시 노트·태블릿을 주도, VR(페이스북·오큘러스)과 삼성페이를 활용한다."]}, {"heading": "모바일 플랫폼 비즈니스의 변화", "points": ["OS 플랫폼에서 서비스 플랫폼으로 전환: 앱스토어 중심의 앱 마켓이 개발자·소비자·단말이 함께 동작하는 앱 생태계를 형성한다.", "앱 등록 규모: 애플 앱스토어 150만 개, 구글 플레이 160만 개 이상이며 앱 간 차별성과 구속력은 줄어들고 있다.", "SNS 기반 서비스 중심 전환: 페이스북·핀터레스트·왓츠앱·카카오톡 등 SNS 중심, 아마존·넷플릭스의 커머스·콘텐츠, 에어비앤비
